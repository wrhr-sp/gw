name: Preview password reset email

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-password-reset-email
  cancel-in-progress: false

jobs:
  request-reset-email:
    name: Request ZITADEL reset email
    runs-on: ubuntu-latest
    environment: preview
    timeout-minutes: 5
    steps:
      - name: Request password reset email without exposing credentials
        env:
          ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
          ZITADEL_SERVICE_USER_TOKEN: ${{ secrets.ZITADEL_SERVICE_USER_TOKEN }}
        run: |
          node <<'NODE'
          const issuer = process.env.ZITADEL_ISSUER?.trim();
          const subject = process.env.ZITADEL_PREVIEW_SUBJECT?.trim();
          const token = process.env.ZITADEL_SERVICE_USER_TOKEN?.trim();
          if (!issuer || !subject || !token) {
            throw new Error("Preview password-reset configuration is incomplete");
          }
          const parsedIssuer = new URL(issuer);
          if (parsedIssuer.protocol !== "https:" || parsedIssuer.username || parsedIssuer.password) {
            throw new Error("Preview ZITADEL issuer is invalid");
          }
          const urlTemplate = "https://werehere-hotel-web-preview.wereheresp.workers.dev/password/set#userID={{.UserID}}&code={{.Code}}&orgID={{.OrgID}}";
          if (urlTemplate.length > 200) throw new Error("Preview password-reset URL template is too long");
          try {
            const response = await fetch(
              new URL(`/v2/users/${encodeURIComponent(subject)}/password_reset`, parsedIssuer),
              {
                method: "POST",
                headers: {
                  accept: "application/json",
                  authorization: `Bearer ${token}`,
                  "content-type": "application/json",
                },
                body: JSON.stringify({
                  sendLink: {
                    notificationType: "NOTIFICATION_TYPE_Email",
                    urlTemplate,
                  },
                }),
                redirect: "manual",
              },
            );
            if (!response.ok) {
              throw new Error(`ZITADEL password reset failed with HTTP ${response.status}`);
            }
            const body = await response.json();
            if (body.verificationCode || body.verification_code) {
              throw new Error("ZITADEL returned a verification code instead of sending email");
            }
            console.log("ZITADEL_PASSWORD_RESET_EMAIL_REQUESTED_WITH_FRAGMENT_TEMPLATE");
          } catch (error) {
            const message = error instanceof Error && /^ZITADEL password reset failed with HTTP \d{3}$/u.test(error.message)
              ? error.message
              : "ZITADEL password reset request failed";
            throw new Error(message);
          }
          NODE
