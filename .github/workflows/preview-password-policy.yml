name: Preview password policy

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "discover는 Preview 조직 fingerprint만 조회하고, apply는 정책을 적용합니다."
        required: true
        default: discover
        type: choice
        options:
          - discover
          - apply

permissions:
  contents: read

concurrency:
  group: preview-password-policy
  cancel-in-progress: false

jobs:
  preview-password-policy:
    environment: preview
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      EXPECTED_PREVIEW_ORG_SHA256: ${{ vars.ZITADEL_PREVIEW_ORGANIZATION_SHA256 }}
      OPERATION: ${{ inputs.operation }}
      ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
      ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
      ZITADEL_SERVICE_USER_TOKEN: ${{ secrets.ZITADEL_SERVICE_USER_TOKEN }}
    steps:
      - name: Discover or apply the Preview password policy
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          import { createHash } from "node:crypto";

          const previewIssuerOrigin = "https://werehere-hotel-preview-mktqpe.au1.zitadel.cloud";
          const issuerValue = process.env.ZITADEL_ISSUER ?? "";
          const operation = process.env.OPERATION;
          const subject = process.env.ZITADEL_PREVIEW_SUBJECT ?? "";
          const token = process.env.ZITADEL_SERVICE_USER_TOKEN ?? "";
          const expectedOrganizationHash = process.env.EXPECTED_PREVIEW_ORG_SHA256 ?? "";

          let issuer;
          try {
            issuer = new URL(issuerValue);
          } catch {
            throw new Error("Preview ZITADEL issuer is invalid");
          }
          if (issuer.origin !== previewIssuerOrigin || issuer.pathname !== "/" || issuer.search || issuer.hash) {
            throw new Error("Preview ZITADEL issuer boundary check failed");
          }
          if (!subject || !token || !["discover", "apply"].includes(operation ?? "")) {
            throw new Error("Preview ZITADEL policy configuration is incomplete");
          }

          async function request(path, init = {}) {
            const response = await fetch(new URL(path, issuer), {
              ...init,
              redirect: "manual",
              headers: {
                accept: "application/json",
                authorization: `Bearer ${token}`,
                ...(init.headers ?? {}),
              },
            });
            if (response.status >= 300 && response.status < 400) {
              const error = new Error(`ZITADEL policy API failed with HTTP ${response.status}`);
              error.status = response.status;
              throw error;
            }
            const text = await response.text();
            if (!response.ok) {
              const error = new Error(`ZITADEL policy API failed with HTTP ${response.status}`);
              error.status = response.status;
              throw error;
            }
            if (!text) return null;
            try {
              return JSON.parse(text);
            } catch {
              throw new Error("ZITADEL policy API returned invalid JSON");
            }
          }

          function policyFrom(body) {
            const policy = body?.policy;
            if (!policy || !/^[1-9][0-9]*$/u.test(String(policy.minLength ?? ""))) {
              throw new Error("ZITADEL password policy response is invalid");
            }
            for (const field of ["hasUppercase", "hasLowercase", "hasNumber", "hasSymbol", "isDefault"]) {
              if (policy[field] !== undefined && typeof policy[field] !== "boolean") {
                throw new Error("ZITADEL password policy response is invalid");
              }
            }
            return {
              minLength: String(policy.minLength),
              hasUppercase: Boolean(policy.hasUppercase),
              hasLowercase: Boolean(policy.hasLowercase),
              hasNumber: Boolean(policy.hasNumber),
              hasSymbol: Boolean(policy.hasSymbol),
              isDefault: Boolean(policy.isDefault),
            };
          }

          const valueKeys = ["minLength", "hasUppercase", "hasLowercase", "hasNumber", "hasSymbol"];
          const equalsPolicy = (left, right, includeDefault = true) =>
            valueKeys.every((key) => left[key] === right[key]) && (!includeDefault || left.isDefault === right.isDefault);
          const sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));

          const userBody = await request(`/v2/users/${encodeURIComponent(subject)}`);
          const organizationId = userBody?.user?.details?.resourceOwner;
          if (typeof organizationId !== "string" || !/^[A-Za-z0-9_-]{1,200}$/u.test(organizationId)) {
            throw new Error("Preview ZITADEL organization could not be derived");
          }
          const organizationHash = createHash("sha256").update(organizationId, "utf8").digest("hex");
          if (operation === "discover") {
            console.log(`PREVIEW_ZITADEL_ORGANIZATION_SHA256=${organizationHash}`);
            process.exit(0);
          }
          if (!/^[a-f0-9]{64}$/u.test(expectedOrganizationHash) || organizationHash !== expectedOrganizationHash) {
            throw new Error("Preview ZITADEL organization boundary check failed");
          }

          const policyPath = "/management/v1/policies/password/complexity";
          const policyHeaders = { "x-zitadel-orgid": organizationId };
          const desiredValues = {
            minLength: "8",
            hasUppercase: false,
            hasLowercase: false,
            hasNumber: true,
            hasSymbol: true,
          };

          async function readPolicy() {
            return policyFrom(await request(policyPath, { headers: policyHeaders }));
          }

          async function waitForPolicy(expected, includeDefault = true) {
            const delays = [0, 250, 500, 1000, 2000, 4000];
            let current;
            for (const delay of delays) {
              if (delay) await sleep(delay);
              current = await readPolicy();
              if (equalsPolicy(current, expected, includeDefault)) return current;
            }
            return current;
          }

          let previous;
          let rollbackEligible = false;
          try {
            previous = await readPolicy();
            try {
              await request(policyPath, {
                method: previous.isDefault ? "POST" : "PUT",
                headers: { ...policyHeaders, "content-type": "application/json" },
                body: JSON.stringify(desiredValues),
              });
              rollbackEligible = true;
            } catch (error) {
              const status = error instanceof Error ? error.status : undefined;
              rollbackEligible = !(typeof status === "number" && status >= 400 && status < 500);
              throw error;
            }

            const desired = { ...desiredValues, isDefault: false };
            const updated = await waitForPolicy(desired);
            if (!updated || !equalsPolicy(updated, desired)) {
              throw new Error("Preview ZITADEL password policy read-back mismatch");
            }
            console.log("PREVIEW_ZITADEL_PASSWORD_POLICY_VERIFIED");
          } catch (error) {
            if (rollbackEligible && previous) {
              try {
                const desired = { ...desiredValues, isDefault: false };
                const current = await waitForPolicy(desired);
                if (current && equalsPolicy(current, desired)) {
                  if (previous.isDefault) {
                    await request(policyPath, { method: "DELETE", headers: policyHeaders });
                  } else {
                    const previousValues = Object.fromEntries(valueKeys.map((key) => [key, previous[key]]));
                    await request(policyPath, {
                      method: "PUT",
                      headers: { ...policyHeaders, "content-type": "application/json" },
                      body: JSON.stringify(previousValues),
                    });
                  }
                  const rolledBack = await waitForPolicy(previous);
                  if (!rolledBack || !equalsPolicy(rolledBack, previous)) {
                    throw new Error("rollback read-back mismatch");
                  }
                } else if (!current || !equalsPolicy(current, previous)) {
                  throw new Error("concurrent password policy change detected");
                }
              } catch {
                throw new Error("Preview ZITADEL password policy update requires manual recovery");
              }
            }
            const message = error instanceof Error && /^ZITADEL policy API failed with HTTP \d{3}$/u.test(error.message)
              ? error.message
              : "Preview ZITADEL password policy update failed";
            throw new Error(message);
          }
          NODE
