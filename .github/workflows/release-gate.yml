name: release-gate

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target. Use production only after explicit approval.'
        required: true
        default: production
        type: choice
        options:
          - production
      confirm_production_deploy:
        description: 'Type DEPLOY_PRODUCTION to confirm production deployment.'
        required: true
        type: string
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/.next/**'
      - '**/.open-next/**'
      - '**/.wrangler/**'
      - '.hermes/**'
      - '**/*.tsbuildinfo'
  push:
    branches: [main]
    paths-ignore:
      - '**/.next/**'
      - '**/.open-next/**'
      - '**/.wrangler/**'
      - '.hermes/**'
      - '**/*.tsbuildinfo'

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  baseline:
    name: baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Workspace checks
        run: pnpm check
      - name: Web production build
        run: pnpm --filter @gw/web build

  cloudflare-build:
    name: cloudflare-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: OpenNext Cloudflare build
        run: pnpm --filter @gw/web build:cf

  cloudflare-preview-deploy:
    name: cloudflare-preview-deploy
    if: github.event_name != 'workflow_dispatch'
    needs: [baseline, cloudflare-build]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy Web to Cloudflare preview Worker
        run: pnpm --filter @gw/web deploy:cf:preview
      - name: Show Cloudflare preview deployment record
        run: pnpm --filter @gw/web exec wrangler deployments list --name gw-web-preview

  cloudflare-production-deploy:
    name: cloudflare-production-deploy
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy_target == 'production' &&
      inputs.confirm_production_deploy == 'DEPLOY_PRODUCTION'
    needs: [baseline, cloudflare-build]
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy Web to Cloudflare production Worker
        run: pnpm --filter @gw/web deploy:cf:production
      - name: Show Cloudflare production deployment record
        run: pnpm --filter @gw/web exec wrangler deployments list --name gw-web
