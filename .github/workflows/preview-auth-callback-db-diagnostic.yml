name: Preview auth callback DB diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-auth-callback-db-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: preview
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reproduce Preview callback DB writes with rollback
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_PREVIEW: ${{ secrets.DATABASE_URL_PREVIEW }}
          DATABASE_RUNTIME_PASSWORD_PREVIEW: ${{ secrets.DATABASE_RUNTIME_PASSWORD_PREVIEW }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
        run: pnpm exec tsx packages/db/scripts/diagnose-preview-auth-session.ts
