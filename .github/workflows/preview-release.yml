            printf '## Secure Preview rollback baseline\n'
            printf -- '- Security contract: `session-derived-tenant-authority-v1`\n'
            printf -- '- Source commit: `%s`\n' "$GITHUB_SHA"
            printf -- '- Workflow run: `%s`\n' "$GITHUB_RUN_ID"
            printf -- '- API Worker version: `%s`\n' "$API_DEPLOYED"
            printf -- '- Deploy tag: `%s`\n' "$API_DEPLOY_TAG"
          } >> "$GITHUB_STEP_SUMMARY"
          printf 'secure_version=%s\n' "$API_DEPLOYED" >> "$GITHUB_OUTPUT"
          printf '%s\n' 'PREVIEW_SECURE_ROLLBACK_BASELINE_VERIFIED'

      - name: Roll back failed Worker release
        if: failure()
        shell: bash
        env:
          CONTRACT_STARTED: ${{ steps.contract_database.outputs.contract_started }}
          API_PREVIOUS: ${{ steps.worker_snapshot.outputs.api_previous }}
          API_EXISTED: ${{ steps.worker_snapshot.outputs.api_existed }}
          API_DEPLOY_OUTCOME: ${{ steps.deploy_api.outcome }}
          API_DEPLOYED: ${{ steps.deploy_api.outputs.deployed_version }}
          API_DEPLOY_ATTEMPTED: ${{ steps.deploy_api.outputs.deploy_attempted }}
          API_DEPLOY_TAG: secure-session-authority-v1-github-${{ github.run_id }}-${{ github.run_attempt }}-api
          RECONCILER_PREVIOUS: ${{ steps.worker_snapshot.outputs.reconciler_previous }}
          RECONCILER_EXISTED: ${{ steps.worker_snapshot.outputs.reconciler_existed }}
          RECONCILER_DEPLOY_OUTCOME: ${{ steps.deploy_reconciler.outcome }}
          RECONCILER_DEPLOYED: ${{ steps.deploy_reconciler.outputs.deployed_version }}
          RECONCILER_DEPLOY_ATTEMPTED: ${{ steps.deploy_reconciler.outputs.deploy_attempted }}
          RECONCILER_DEPLOY_TAG: github-${{ github.run_id }}-${{ github.run_attempt }}-reconciler
          WEB_PREVIOUS: ${{ steps.worker_snapshot.outputs.web_previous }}
          WEB_EXISTED: ${{ steps.worker_snapshot.outputs.web_existed }}
          WEB_DEPLOY_OUTCOME: ${{ steps.deploy_web.outcome }}
          WEB_DEPLOYED: ${{ steps.deploy_web.outputs.deployed_version }}
          WEB_DEPLOY_ATTEMPTED: ${{ steps.deploy_web.outputs.deploy_attempted }}
          WEB_DEPLOY_TAG: github-${{ github.run_id }}-${{ github.run_attempt }}-web
        run: |
          set +e
          resolve_tagged_version() {
            local worker_name="$1"
            local tag="$2"
            local valid_absence_count=0
            local attempt
            for attempt in 1 2 3 4 5; do
              local versions_file
              versions_file="$(mktemp)"
              if curl --fail --silent --show-error \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/versions?deployable=true" \
                > "$versions_file"; then
                local resolved
                if resolved="$(jq -er --arg tag "$tag" '
                  if .success != true
                    or (.result | type) != "object"
                    or (.result.items | type) != "array" then
                    error("Worker versions response failed safety validation")
                  else
                    [.result.items[] | select(.annotations["workers/tag"]? == $tag)] as $matches
                    | if ($matches | length) == 0 then ""
                      elif ($matches | length) != 1
                        or ($matches[0].id | type) != "string"
                        or ($matches[0].id | length) == 0 then
                        error("Tagged Worker version was ambiguous")
                      else $matches[0].id end
                  end
                ' "$versions_file")"; then
                  rm -f "$versions_file"
                  if [[ -n "$resolved" ]]; then
                    printf '%s\n' "$resolved"
                    return 0
                  fi
                  valid_absence_count=$((valid_absence_count + 1))
                else
                  rm -f "$versions_file"
                fi
              else
                rm -f "$versions_file"
              fi
              if [[ "$attempt" -lt 5 ]]; then sleep 2; fi
            done
            if [[ "$valid_absence_count" -eq 5 ]]; then return 1; fi
            return 2
          }
          active_worker_version() {
            local worker_name="$1"
            local snapshot_file
            snapshot_file="$(mktemp)"
            if ! pnpm --filter @werehere/api exec wrangler deployments list \
              --name "$worker_name" --json > "$snapshot_file"; then
              rm -f "$snapshot_file"
              return 1
            fi
            if ! jq -er '
              if type != "array" or length == 0
                or (.[-1].versions | type) != "array"
                or (.[-1].versions | length) != 1
                or .[-1].versions[0].percentage != 100
                or (.[-1].versions[0].version_id | type) != "string"
                or (.[-1].versions[0].version_id | length) == 0 then
                error("Active Worker deployment was not a single 100 percent version")
              else
                .[-1].versions[0].version_id
              end
            ' "$snapshot_file"; then
              rm -f "$snapshot_file"
              return 1
            fi
            rm -f "$snapshot_file"
          }
          worker_exists() {
            local worker_name="$1"
            local response_file
            response_file="$(mktemp)"
            local status
            if ! status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/settings")"; then
              rm -f "$response_file"
              return 2
            fi
            if [[ "$status" == "200" ]]; then
              if jq -e '.success == true and (.result | type) == "object"' \
                "$response_file" >/dev/null; then
                rm -f "$response_file"
                return 0
              fi
              rm -f "$response_file"
              return 2
            fi
            if [[ "$status" == "404" ]]; then
              if jq -e '.success == false and (.errors | type) == "array"' \
                "$response_file" >/dev/null; then
                rm -f "$response_file"
                return 1
              fi
              rm -f "$response_file"
              return 2
            fi
            rm -f "$response_file"
            return 2
          }
          rollback_worker() {
            local worker_name="$1"
            local previous="$2"
            local existed="$3"
            local outcome="$4"
            local deployed="$5"
            local attempted="$6"
            local deploy_tag="$7"
            if [[ "$outcome" == "skipped" || -z "$outcome" ]]; then
              return 0
            fi
            if [[ "$attempted" != "true" ]]; then
              return 1
            fi
            if [[ -z "$deployed" ]]; then
              local recovered
              recovered="$(resolve_tagged_version "$worker_name" "$deploy_tag")"
              local resolve_status="$?"
              if [[ "$resolve_status" -eq 0 ]]; then
                deployed="$recovered"
              elif [[ "$resolve_status" -eq 1 && "$outcome" == "failure" ]]; then
                if [[ "$existed" == "true" && -n "$previous" ]]; then
                  local unchanged_active
                  unchanged_active="$(active_worker_version "$worker_name")" || return 1
                  [[ "$unchanged_active" == "$previous" ]]
                  return
                fi
                if [[ "$existed" == "false" ]]; then
                  if worker_exists "$worker_name"; then
                    return 1
                  else
                    [[ "$?" -eq 1 ]]
                    return
                  fi
                fi
                return 1
              else
                return 1
              fi
            fi
            local current
            current="$(active_worker_version "$worker_name")" || return 1
            if [[ "$current" != "$deployed" ]]; then
              printf 'Worker changed outside this release; refusing rollback: %s\n' "$worker_name" >&2
              return 1
            fi
            if [[ "$existed" == "true" && -n "$previous" ]]; then
              # Wrangler 4.111.0 and the provider API expose no expected-current/ETag
              # rollback mutation. Any automatic rollback can overwrite a concurrent
              # deployment after the active-version check, so fail closed instead.
              printf 'Conditional rollback is unavailable; operator recovery required: %s\n' "$worker_name" >&2
              return 1
            fi
            if [[ "$existed" == "false" ]]; then
              # Never auto-delete a first deployment: Wrangler delete has no conditional
              # expected-current fence and could delete a concurrently deployed Worker.
              printf 'First-deploy rollback requires operator recovery: %s\n' "$worker_name" >&2
              return 1
            fi
            return 1
          }
          cloudflare_token_name=CLOUDFLARE_API_TOKEN
          classify_hyperdrive_recovery() {
            local snapshot_dir="/tmp/werehere-hyperdrive-retarget"
            local api_before="$snapshot_dir/api_id-before.json"
            local reconciler_before="$snapshot_dir/reconciler_id-before.json"
            local api_attempt="$snapshot_dir/api_id-create-attempted"
            local reconciler_attempt="$snapshot_dir/reconciler_id-create-attempted"
            if [[ ! -f "$api_before" && ! -f "$reconciler_before" && ! -f "$api_attempt" && ! -f "$reconciler_attempt" ]]; then
              return 0
            fi
            if [[ "$CONTRACT_STARTED" == "true" || "$API_DEPLOY_ATTEMPTED" == "true" || "$RECONCILER_DEPLOY_ATTEMPTED" == "true" || "$WEB_DEPLOY_ATTEMPTED" == "true" ]]; then
              printf '%s\n' 'PREVIEW_HYPERDRIVE_POST_DEPLOY_OPERATOR_RECOVERY_REQUIRED' >&2
              return 1
            fi
            local list_file
            list_file="$(mktemp)"
            if ! curl --fail --silent --show-error \
              -H "Authorization: Bearer ${!cloudflare_token_name}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/hyperdrive/configs?per_page=100" \
              > "$list_file"; then
              rm -f "$list_file"
              printf '%s\n' 'PREVIEW_HYPERDRIVE_RECOVERY_STATE_INDETERMINATE' >&2
              return 1
            fi
            if ! node scripts/validate-cloudflare-hyperdrive-list.mjs "$list_file" >/dev/null; then
              rm -f "$list_file"
              printf '%s\n' 'PREVIEW_HYPERDRIVE_RECOVERY_STATE_INDETERMINATE' >&2
              return 1
            fi
            classify_one() {
              local before_file="$1"
              local attempt_file="$2"
              local created_id_file="$3"
              local expected_name="$4"
              local url_file="$5"
              local id name count current_file
              if [[ -f "$before_file" ]]; then
                id="$(jq -er '.id | select(type == "string" and length > 0)' "$before_file")" || return 1
                name="$(jq -er '.name | select(type == "string" and length > 0)' "$before_file")" || return 1
                count="$(jq --arg id "$id" --arg name "$name" '[.result[] | select(.id == $id and .name == $name)] | length' "$list_file")" || return 1
                [[ "$count" -eq 1 ]] || return 1
              elif [[ -f "$attempt_file" ]]; then
                name="$(<"$attempt_file")"
                [[ "$name" == "$expected_name" ]] || return 1
                if [[ -f "$created_id_file" ]]; then
                  id="$(<"$created_id_file")"
                  [[ "$id" =~ ^[0-9a-f]{32}$ ]] || return 1
                  count="$(jq --arg id "$id" --arg name "$name" '[.result[] | select(.id == $id and .name == $name)] | length' "$list_file")" || return 1
                else
                  count="$(jq --arg name "$name" '[.result[] | select(.name == $name)] | length' "$list_file")" || return 1
                fi
                if [[ "$count" -eq 0 ]]; then
                  printf 'ABSENT\n'
                  return 0
                fi
                [[ "$count" -eq 1 ]] || return 1
              else
                printf 'UNTOUCHED\n'
                return 0
              fi
              current_file="$(mktemp)"
              if [[ -n "$id" ]]; then
                jq -eS --arg id "$id" --arg name "$name" '
                  .result[] | select(.id == $id and .name == $name) | {id, name, origin, caching}
                ' "$list_file" > "$current_file" || { rm -f "$current_file"; return 1; }
              else
                jq -eS --arg name "$name" '
                  .result[] | select(.name == $name) | {id, name, origin, caching}
                ' "$list_file" > "$current_file" || { rm -f "$current_file"; return 1; }
              fi
              if [[ -f "$before_file" ]] && cmp -s "$before_file" "$current_file"; then
                rm -f "$current_file"
                printf 'ORIGINAL\n'
                return 0
              fi
              local state
              state="$(node scripts/preview-hyperdrive-retarget-contract.mjs \
                target-state "$current_file" "$url_file")" || { rm -f "$current_file"; return 1; }
              rm -f "$current_file"
              [[ "$state" == "MATCH" ]] || return 1
              printf 'CANONICAL\n'
            }
            local api_state reconciler_state
            api_state="$(classify_one "$api_before" "$api_attempt" "$snapshot_dir/api_id-created-id" 'werehere-hotel-api-preview' "$API_RUNTIME_DATABASE_URL_FILE")" || api_state=INDETERMINATE
            reconciler_state="$(classify_one "$reconciler_before" "$reconciler_attempt" "$snapshot_dir/reconciler_id-created-id" 'werehere-hotel-reconciler-preview' "$RECONCILER_DATABASE_URL_FILE")" || reconciler_state=INDETERMINATE
            rm -f "$list_file"
            if [[ "$api_state" == "CANONICAL" && "$reconciler_state" == "CANONICAL" ]]; then
              printf '%s\n' 'PREVIEW_HYPERDRIVES_CANONICAL_DURABLE_OPERATOR_RECOVERY_REQUIRED' >&2
            elif [[ "$api_state" == "ORIGINAL" && "$reconciler_state" == "ORIGINAL" ]]; then
              printf '%s\n' 'PREVIEW_HYPERDRIVES_ORIGINAL_STATE_OPERATOR_RECOVERY_REQUIRED' >&2
            elif [[ "$api_state" == "INDETERMINATE" || "$reconciler_state" == "INDETERMINATE" ]]; then
              printf '%s\n' 'PREVIEW_HYPERDRIVE_RECOVERY_STATE_INDETERMINATE' >&2
            else
              printf '%s\n' 'PREVIEW_HYPERDRIVE_SPLIT_TOPOLOGY_OPERATOR_RECOVERY_REQUIRED' >&2
            fi
            return 1
          }
          if [[ "$CONTRACT_STARTED" == "true" ]]; then
            contract_active_failed=0
            [[ "$(active_worker_version werehere-hotel-api-preview)" == "$API_DEPLOYED" ]] \
              || contract_active_failed=1
            [[ "$(active_worker_version werehere-hotel-account-reconciler-preview)" == "$RECONCILER_DEPLOYED" ]] \
              || contract_active_failed=1
            [[ "$(active_worker_version werehere-hotel-web-preview)" == "$WEB_DEPLOYED" ]] \
              || contract_active_failed=1
            if [[ "$contract_active_failed" -ne 0 ]]; then
              printf '%s\n' 'POST_CONTRACT_ACTIVE_WORKER_CHANGED' >&2
            else
              printf '%s\n' 'POST_CONTRACT_COMPATIBLE_WORKERS_PRESERVED' >&2
            fi
            printf '%s\n' 'PREVIEW_CONTRACT_OPERATOR_RECOVERY_REQUIRED' >&2
            exit 1
          fi

          rollback_failed=0
          classify_hyperdrive_recovery || rollback_failed=1
          rollback_worker werehere-hotel-web-preview \
            "$WEB_PREVIOUS" "$WEB_EXISTED" "$WEB_DEPLOY_OUTCOME" "$WEB_DEPLOYED" \
            "$WEB_DEPLOY_ATTEMPTED" "$WEB_DEPLOY_TAG" || rollback_failed=1
          rollback_worker werehere-hotel-api-preview \
            "$API_PREVIOUS" "$API_EXISTED" "$API_DEPLOY_OUTCOME" "$API_DEPLOYED" \
            "$API_DEPLOY_ATTEMPTED" "$API_DEPLOY_TAG" || rollback_failed=1
          rollback_worker werehere-hotel-account-reconciler-preview \
            "$RECONCILER_PREVIOUS" "$RECONCILER_EXISTED" "$RECONCILER_DEPLOY_OUTCOME" "$RECONCILER_DEPLOYED" \
            "$RECONCILER_DEPLOY_ATTEMPTED" "$RECONCILER_DEPLOY_TAG" || rollback_failed=1
          if [[ "$rollback_failed" -ne 0 ]]; then
            printf '%s\n' 'PREVIEW_WORKER_OPERATOR_RECOVERY_REQUIRED' >&2
            exit 1
          fi
          printf '%s\n' 'PREVIEW_WORKER_ROLLBACK_VERIFIED'

      - name: Remove transient credential files
        if: always()
        run: |
          rm -f "$API_RUNTIME_DATABASE_URL_FILE"
          rm -f "$RECONCILER_DATABASE_URL_FILE"
          rm -f /tmp/werehere-api-preview-secrets.json
          rm -rf /tmp/werehere-hyperdrive-retarget
          rm -f /tmp/werehere-api-preview-preflight.json
          rm -f apps/api/wrangler.preview.generated.json
          rm -f apps/api/wrangler.reconciler.preview.generated.json
