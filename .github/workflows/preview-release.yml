name: hotel-preview-release

on:
  workflow_dispatch:
    inputs:
      preview_hyperdrive_retarget:
        description: Allow one-time retarget only when the existing API Hyperdrive does not match the canonical Preview database
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  deployments: write

concurrency:
  group: hotel-preview-release
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: preview
      url: https://werehere-hotel-web-preview.wereheresp.workers.dev
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AUTH_TRANSACTION_ENCRYPTION_KEY: ${{ secrets.AUTH_TRANSACTION_ENCRYPTION_KEY }}
      DATABASE_API_RUNTIME_PASSWORD_PREVIEW: ${{ secrets.DATABASE_API_RUNTIME_PASSWORD_PREVIEW }}
      DATABASE_RECONCILER_PASSWORD_PREVIEW: ${{ secrets.DATABASE_RECONCILER_PASSWORD_PREVIEW }}
      ZITADEL_SERVICE_USER_TOKEN: ${{ secrets.ZITADEL_SERVICE_USER_TOKEN }}
      ZITADEL_USER_PROVISIONER_TOKEN: ${{ secrets.ZITADEL_USER_PROVISIONER_TOKEN }}
      ZITADEL_PREVIEW_SUBJECT_SHA256: ${{ secrets.ZITADEL_PREVIEW_SUBJECT_SHA256 }}
      ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
      ZITADEL_CLIENT_ID: ${{ vars.ZITADEL_CLIENT_ID }}
      ZITADEL_CONSOLE_CLIENT_ID: ${{ vars.ZITADEL_CONSOLE_CLIENT_ID }}
      ZITADEL_REDIRECT_URI: ${{ vars.ZITADEL_REDIRECT_URI }}
      ZITADEL_ORGANIZATION_ID: ${{ vars.ZITADEL_ORGANIZATION_ID }}
      PREVIEW_BOOTSTRAP_APPROVAL_REF: ${{ vars.PREVIEW_BOOTSTRAP_APPROVAL_REF }}
      WEB_PREVIEW_URL: https://werehere-hotel-web-preview.wereheresp.workers.dev
      API_RUNTIME_DATABASE_URL_FILE: /tmp/werehere-preview-api-runtime-url
      RECONCILER_DATABASE_URL_FILE: /tmp/werehere-preview-reconciler-url

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Console smoke
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate required Preview configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_PREVIEW: ${{ secrets.DATABASE_URL_PREVIEW }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
          ZITADEL_PREVIEW_PASSWORD: ${{ secrets.ZITADEL_PREVIEW_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            AUTH_TRANSACTION_ENCRYPTION_KEY
            DATABASE_URL
            DATABASE_URL_PREVIEW
            DATABASE_API_RUNTIME_PASSWORD_PREVIEW
            DATABASE_RECONCILER_PASSWORD_PREVIEW
            ZITADEL_SERVICE_USER_TOKEN
            ZITADEL_USER_PROVISIONER_TOKEN
            ZITADEL_PREVIEW_SUBJECT
            ZITADEL_PREVIEW_SUBJECT_SHA256
            ZITADEL_PREVIEW_PASSWORD
            ZITADEL_ISSUER
            ZITADEL_CLIENT_ID
            ZITADEL_CONSOLE_CLIENT_ID
            ZITADEL_REDIRECT_URI
            ZITADEL_ORGANIZATION_ID
            PREVIEW_BOOTSTRAP_APPROVAL_REF
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            for name in "${missing[@]}"; do
              printf 'Missing required Preview configuration: %s\n' "$name" >&2
            done
            exit 1
          fi
          unset ZITADEL_PREVIEW_PASSWORD
          node <<'NODE'
          const key = process.env.AUTH_TRANSACTION_ENCRYPTION_KEY;
          const bytes = Buffer.from(key, "base64url");
          if (!/^[A-Za-z0-9_-]+$/u.test(key)
            || bytes.byteLength !== 32
            || bytes.toString("base64url") !== key) {
            throw new Error("AUTH_TRANSACTION_ENCRYPTION_KEY must be canonical 256-bit base64url");
          }
          const { hkdfSync } = require("node:crypto");
          const identifierKey = hkdfSync(
            "sha256",
            bytes,
            Buffer.from("werehere-auth-rate-limit-salt-v1"),
            Buffer.from("werehere-auth-rate-limit-hmac-v1"),
            32,
          );
          if (identifierKey.byteLength !== 32) {
            throw new Error("AUTH identifier HMAC subkey derivation failed");
          }
          const expectedRedirect = "https://werehere-hotel-web-preview.wereheresp.workers.dev/api/auth/callback";
          if (process.env.ZITADEL_REDIRECT_URI !== expectedRedirect) {
            throw new Error("ZITADEL_REDIRECT_URI does not match the Preview Web callback");
          }
          NODE
          API_HYPERDRIVE_ID=00000000000000000000000000000000 \
            node scripts/render-api-preview-config.mjs \
              apps/api/wrangler.preview.jsonc \
              /tmp/werehere-api-preview-preflight.json
          rm -f /tmp/werehere-api-preview-preflight.json
          printf '%s\n' 'PREVIEW_CONFIGURATION_PRESENT'

      - name: Verify approved ZITADEL bootstrap identity
        env:
          ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
          ZITADEL_ORGANIZATION_ID: ${{ vars.ZITADEL_ORGANIZATION_ID }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
          ZITADEL_PREVIEW_SUBJECT_SHA256: ${{ secrets.ZITADEL_PREVIEW_SUBJECT_SHA256 }}
          ZITADEL_USER_PROVISIONER_TOKEN: ${{ secrets.ZITADEL_USER_PROVISIONER_TOKEN }}
        run: pnpm exec tsx packages/db/scripts/verify-zitadel-bootstrap.ts

      - name: Snapshot active Worker versions
        id: worker_snapshot
        shell: bash
        run: |
          set -euo pipefail
          cloudflare_token="$CLOUDFLARE_API_TOKEN"
          worker_exists() {
            local worker_name="$1"
            local response_file
            response_file="$(mktemp)"
            local status
            if ! status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              -H "Authorization: Bearer $cloudflare_token" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/settings")"; then
              rm -f "$response_file"
              return 2
            fi
            if [[ "$status" == "200" ]]; then
              if jq -e '.success == true and (.result | type) == "object"' \
                "$response_file" >/dev/null; then
                rm -f "$response_file"
                return 0
              fi
              rm -f "$response_file"
              return 2
            fi
            if [[ "$status" == "404" ]]; then
              if jq -e '.success == false and (.errors | type) == "array"' \
                "$response_file" >/dev/null; then
                rm -f "$response_file"
                return 1
              fi
              rm -f "$response_file"
              return 2
            fi
            rm -f "$response_file"
            return 2
          }
          worker_hyperdrive_id() {
            local worker_name="$1"
            local binding_name="$2"
            local response_file status id
            response_file="$(mktemp)"
            if ! status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              -H "Authorization: Bearer $cloudflare_token" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/settings")"; then
              rm -f "$response_file"
              return 1
            fi
            if [[ "$status" != "200" ]]; then
              rm -f "$response_file"
              return 1
            fi
            if ! id="$(
              node "$GITHUB_WORKSPACE/scripts/validate-cloudflare-worker-hyperdrive-binding.mjs" \
                "$response_file" "$binding_name"
            )"; then
              rm -f "$response_file"
              return 1
            fi
            rm -f "$response_file"
            printf '%s\n' "$id"
          }
          snapshot() {
            local output_name="$1"
            local worker_name="$2"
            if worker_exists "$worker_name"; then
              :
            else
              local exists_status="$?"
              if [[ "$exists_status" -eq 1 ]]; then
                printf '%s_previous=\n' "$output_name" >> "$GITHUB_OUTPUT"
                printf '%s_existed=false\n' "$output_name" >> "$GITHUB_OUTPUT"
                printf '%s_hyperdrive_id=\n' "$output_name" >> "$GITHUB_OUTPUT"
                return
              fi
              printf 'Worker existence lookup failed: %s\n' "$worker_name" >&2
              exit 1
            fi
            local hyperdrive_id=""
            if [[ "$output_name" == "api" ]]; then
              hyperdrive_id="$(worker_hyperdrive_id "$worker_name" API_HYPERDRIVE)" || {
                printf 'API Worker Hyperdrive binding lookup failed.\n' >&2
                exit 1
              }
            elif [[ "$output_name" == "reconciler" ]]; then
              hyperdrive_id="$(worker_hyperdrive_id "$worker_name" RECONCILER_HYPERDRIVE)" || {
                printf 'Reconciler Worker Hyperdrive binding lookup failed.\n' >&2
                exit 1
              }
            fi
            local snapshot_file
            local version
            snapshot_file="$(mktemp)"
            pnpm --filter @werehere/api exec wrangler deployments list \
              --name "$worker_name" --json > "$snapshot_file"
            if ! version="$(jq -er '
              if type != "array" or length == 0 then
                error("Worker deployment history was missing")
              elif (.[-1].versions | type) != "array"
                or (.[-1].versions | length) != 1
                or (.[-1].versions[0].percentage | type) != "number"
                or .[-1].versions[0].percentage != 100
                or (.[-1].versions[0].version_id | type) != "string"
                or (.[-1].versions[0].version_id | length) == 0 then
                error("Active Worker deployment was not a single 100 percent version")
              else
                .[-1].versions[0].version_id
              end
            ' "$snapshot_file")"; then
              rm -f "$snapshot_file"
              printf 'Active Worker deployment is unsafe to snapshot: %s\n' "$worker_name" >&2
              exit 1
            fi
            rm -f "$snapshot_file"
            printf '%s_previous=%s\n' "$output_name" "$version" >> "$GITHUB_OUTPUT"
            printf '%s_existed=true\n' "$output_name" >> "$GITHUB_OUTPUT"
            printf '%s_hyperdrive_id=%s\n' "$output_name" "$hyperdrive_id" >> "$GITHUB_OUTPUT"
          }
          snapshot api werehere-hotel-api-preview
          snapshot reconciler werehere-hotel-account-reconciler-preview
          snapshot web werehere-hotel-web-preview

      - name: Validate Preview Worker snapshot topology
        shell: bash
        run: |
          set -euo pipefail
          api="${{ steps.worker_snapshot.outputs.api_existed }}"
          reconciler="${{ steps.worker_snapshot.outputs.reconciler_existed }}"
          web="${{ steps.worker_snapshot.outputs.web_existed }}"
          if [[ "$api" == "true" && "$reconciler" == "true" && "$web" == "true" ]]; then
            exit 0
          fi
          if [[ "$api" == "true" && "$reconciler" == "false" && "$web" == "true" ]]; then
            printf '%s\n' 'Preview reconciler bootstrap topology accepted.'
            exit 0
          fi
          if [[ "$api" == "false" && "$reconciler" == "false" && "$web" == "false" ]]; then
            exit 0
          fi
          printf '%s\n' 'Preview Worker topology is partial; refusing release.' >&2
          exit 1

      - name: Expand Neon Preview database for compatible Worker deploy
        env:
          PREVIEW_PROVISION_PHASE: EXPAND
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_PREVIEW: ${{ secrets.DATABASE_URL_PREVIEW }}
          DATABASE_API_RUNTIME_PASSWORD_PREVIEW: ${{ secrets.DATABASE_API_RUNTIME_PASSWORD_PREVIEW }}
          DATABASE_RECONCILER_PASSWORD_PREVIEW: ${{ secrets.DATABASE_RECONCILER_PASSWORD_PREVIEW }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
          ZITADEL_PREVIEW_SUBJECT_SHA256: ${{ secrets.ZITADEL_PREVIEW_SUBJECT_SHA256 }}
          ZITADEL_PREVIEW_ORGANIZATION_ID: ${{ vars.ZITADEL_ORGANIZATION_ID }}
          PREVIEW_BOOTSTRAP_APPROVAL_REF: ${{ vars.PREVIEW_BOOTSTRAP_APPROVAL_REF }}
        run: pnpm exec tsx packages/db/scripts/provision-preview.ts

      - name: Verify previous Workers remain compatible after expand
        if: steps.worker_snapshot.outputs.api_existed == 'true' && steps.worker_snapshot.outputs.web_existed == 'true'
        id: pre_hyperdrive_compatibility
        env:
          PREVIEW_HYPERDRIVE_RETARGET_APPROVED: ${{ inputs.preview_hyperdrive_retarget }}
        run: |
          set +e
          readiness_classification="$(
            node scripts/preview-hyperdrive-retarget-contract.mjs probe "$WEB_PREVIEW_URL"
          )"
          readiness_status="$?"
          set -e
          if [[ "$readiness_status" -eq 0 && "$readiness_classification" == "READY" ]]; then
            node scripts/smoke-cloudflare-preview.mjs
            node scripts/smoke-zitadel-console-preview.mjs
            printf 'retarget_required=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$readiness_status" -ne 10 || "$readiness_classification" != "DB_DEPENDENCY_UNAVAILABLE" ]]; then
            printf '%s\n' 'PREVIEW_EXISTING_WORKER_READINESS_UNCLASSIFIED' >&2
            exit 1
          fi
          if [[ "$PREVIEW_HYPERDRIVE_RETARGET_APPROVED" != "true" ]]; then
            printf '%s\n' 'PREVIEW_EXISTING_WORKER_DB_DEPENDENCY_UNAVAILABLE' >&2
            exit 1
          fi
          printf 'retarget_required=true\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' 'PREVIEW_EXISTING_WORKER_RETARGET_REQUIRED'

      - name: Create or update Preview Hyperdrives
        id: hyperdrive
        shell: bash
        working-directory: apps/api
        env:
          PREVIEW_HYPERDRIVE_RETARGET_APPROVED: ${{ inputs.preview_hyperdrive_retarget }}
          PREVIEW_HYPERDRIVE_RETARGET_REQUIRED: ${{ steps.pre_hyperdrive_compatibility.outputs.retarget_required }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/hyperdrive/configs"
          list_url="$api?per_page=100"
          temp_dir="$(mktemp -d)"
          legacy_before="$temp_dir/legacy-before.json"
          legacy_after="$temp_dir/legacy-after.json"
          trap 'rm -rf "$temp_dir"' EXIT
          fetch_hyperdrive_list() {
            local output_file="$1"
            curl --fail --silent --show-error \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "$list_url" > "$output_file"
            if ! node "$GITHUB_WORKSPACE/scripts/validate-cloudflare-hyperdrive-list.mjs" "$output_file" >/dev/null; then
              printf '%s\n' 'Hyperdrive list response failed safety validation.' >&2
              return 1
            fi
          }
          snapshot_legacy_hyperdrive() {
            local output_file="$1"
            local list_file
            local count
            list_file="$(mktemp "$temp_dir/hyperdrive-list.XXXXXX")"
            fetch_hyperdrive_list "$list_file"
            count="$(jq '[.result[] | select(.name == "werehere-hotel-preview")] | length' "$list_file")"
            if [[ "$count" -ne 1 ]]; then
              printf '%s\n' 'The legacy Preview Hyperdrive is unavailable or ambiguous.' >&2
              return 1
            fi
            jq -S '.result[] | select(.name == "werehere-hotel-preview")' \
              "$list_file" > "$output_file"
          }
          hyperdrive_count() {
            local list_file="$1"
            local name="$2"
            local expected_id="$3"
            if [[ -n "$expected_id" ]]; then
              jq --arg id "$expected_id" '[.result[] | select(.id == $id)] | length' "$list_file"
            else
              jq --arg name "$name" '[.result[] | select(.name == $name)] | length' "$list_file"
            fi
          }
          write_hyperdrive_config() {
            local list_file="$1"
            local output_file="$2"
            local name="$3"
            local expected_id="$4"
            if [[ -n "$expected_id" ]]; then
              jq -eS --arg id "$expected_id" '
                .result[] | select(.id == $id) | {id, name, origin, caching}
              ' "$list_file" > "$output_file"
            else
              jq -eS --arg name "$name" '
                .result[] | select(.name == $name) | {id, name, origin, caching}
              ' "$list_file" > "$output_file"
            fi
          }
          hyperdrive_target_state() {
            local name="$1"
            local url_file="$2"
            local expected_id="$3"
            local list_file
            local config_file
            local count
            list_file="$(mktemp "$temp_dir/hyperdrive-target-list.XXXXXX")"
            config_file="$(mktemp "$temp_dir/hyperdrive-target-config.XXXXXX")"
            fetch_hyperdrive_list "$list_file"
            count="$(hyperdrive_count "$list_file" "$name" "$expected_id")"
            if [[ "$count" -ne 1 ]]; then
              printf '%s\n' 'The existing API Hyperdrive binding is unavailable or ambiguous for retarget validation.' >&2
              return 2
            fi
            write_hyperdrive_config "$list_file" "$config_file" "$name" "$expected_id"
            node "$GITHUB_WORKSPACE/scripts/preview-hyperdrive-retarget-contract.mjs" \
              target-state "$config_file" "$url_file"
          }
          ensure_hyperdrive() {
            local name="$1"
            local url_file="$2"
            local output_name="$3"
            local expected_existing="$4"
            local allow_mismatch="$5"
            local expected_id="$6"
            local runtime_url
            local list_file
            local current_file
            local verified_file
            local count
            local id=""
            local state
            runtime_url="$(<"$url_file")"
            printf '::add-mask::%s\n' "$runtime_url"
            list_file="$(mktemp "$temp_dir/hyperdrive-list.XXXXXX")"
            current_file="$(mktemp "$temp_dir/hyperdrive-current.XXXXXX")"
            verified_file="$(mktemp "$temp_dir/hyperdrive-verified.XXXXXX")"
            fetch_hyperdrive_list "$list_file"
            count="$(hyperdrive_count "$list_file" "$name" "$expected_id")"
            if [[ "$count" -gt 1 ]]; then
              printf 'Multiple Hyperdrive configs matched the expected identity: %s\n' "$name" >&2
              return 1
            fi
            if [[ "$count" -eq 0 ]]; then
              if [[ "$expected_existing" == "true" ]]; then
                printf 'Worker exists without its required Hyperdrive config: %s\n' "$name" >&2
                return 1
              fi
              local create_output_file created_id_file
              create_output_file="$(mktemp "$temp_dir/hyperdrive-create-output.XXXXXX")"
              created_id_file="$(mktemp "$temp_dir/hyperdrive-created-id.XXXXXX")"
              printf '%s\n' "$name" > "/tmp/werehere-hyperdrive-retarget/${output_name}-create-attempted"
              chmod 600 "/tmp/werehere-hyperdrive-retarget/${output_name}-create-attempted"
              if ! pnpm exec wrangler hyperdrive create "$name" \
                --config wrangler.preview.jsonc \
                --connection-string "$runtime_url" \
                --sslmode require \
                --caching-disabled >"$create_output_file" 2>&1; then
                rm -f "$create_output_file" "$created_id_file"
                printf 'Hyperdrive create outcome was ambiguous: %s\n' "$name" >&2
                return 1
              fi
              if ! id="$(
                node "$GITHUB_WORKSPACE/scripts/preview-hyperdrive-retarget-contract.mjs" \
                  parse-created-id "$create_output_file"
              )"; then
                rm -f "$create_output_file" "$created_id_file"
                printf 'Hyperdrive create ID was unavailable: %s\n' "$name" >&2
                return 1
              fi
              rm -f "$create_output_file"
              printf '%s\n' "$id" > "$created_id_file"
              install -m 600 "$created_id_file" "/tmp/werehere-hyperdrive-retarget/${output_name}-created-id"
              rm -f "$created_id_file"
            else
              write_hyperdrive_config "$list_file" "$current_file" "$name" "$expected_id"
              id="$(jq -er '.id | select(type == "string" and length > 0)' "$current_file")"
              state="$(node "$GITHUB_WORKSPACE/scripts/preview-hyperdrive-retarget-contract.mjs" \
                target-state "$current_file" "$url_file")"
              if [[ "$state" == "MISMATCH" ]]; then
                if [[ "$allow_mismatch" != "true" ]]; then
                  printf 'Hyperdrive target mismatch requires the approved retarget state: %s\n' "$name" >&2
                  return 1
                fi
                fetch_hyperdrive_list "$list_file"
                count="$(hyperdrive_count "$list_file" "$name" "$expected_id")"
                [[ "$count" -eq 1 ]] || return 1
                write_hyperdrive_config "$list_file" "$verified_file" "$name" "$expected_id"
                if ! cmp -s "$current_file" "$verified_file"; then
                  printf 'Hyperdrive changed after validation; refusing retarget: %s\n' "$name" >&2
                  return 1
                fi
                install -m 600 "$current_file" "/tmp/werehere-hyperdrive-retarget/${output_name}-before.json"
                pnpm exec wrangler hyperdrive update "$id" \
                  --config wrangler.preview.jsonc \
                  --connection-string "$runtime_url" \
                  --sslmode require \
                  --caching-disabled >/dev/null
                printf '%s_mutated=true\n' "$output_name" >> "$GITHUB_OUTPUT"
              elif [[ "$state" != "MATCH" ]]; then
                printf 'Hyperdrive origin metadata is invalid: %s\n' "$name" >&2
                return 1
              fi
            fi
            fetch_hyperdrive_list "$list_file"
            count="$(hyperdrive_count "$list_file" "$name" "$id")"
            if [[ "$count" -ne 1 ]]; then
              printf 'Hyperdrive config was unavailable or ambiguous after provisioning: %s\n' "$name" >&2
              return 1
            fi
            write_hyperdrive_config "$list_file" "$verified_file" "$name" "$id"
            if [[ -n "$id" && "$(jq -r '.id' "$verified_file")" != "$id" ]]; then
              printf 'Hyperdrive identity changed during provisioning: %s\n' "$name" >&2
              return 1
            fi
            id="$(jq -er '.id | select(type == "string" and length > 0)' "$verified_file")"
            state="$(node "$GITHUB_WORKSPACE/scripts/preview-hyperdrive-retarget-contract.mjs" \
              target-state "$verified_file" "$url_file")"
            if [[ "$state" != "MATCH" ]]; then
              printf 'Hyperdrive canonical origin read-back failed: %s\n' "$name" >&2
              return 1
            fi
            printf '%s=%s\n' "$output_name" "$id" >> "$GITHUB_OUTPUT"
          }
          mkdir -m 700 /tmp/werehere-hyperdrive-retarget
          api_existed="${{ steps.worker_snapshot.outputs.api_existed }}"
          reconciler_existed="${{ steps.worker_snapshot.outputs.reconciler_existed }}"
          web_existed="${{ steps.worker_snapshot.outputs.web_existed }}"
          api_hyperdrive_id="${{ steps.worker_snapshot.outputs.api_hyperdrive_id }}"
          reconciler_hyperdrive_id="${{ steps.worker_snapshot.outputs.reconciler_hyperdrive_id }}"
          if [[ "$api_existed" == "true" && ! "$api_hyperdrive_id" =~ ^[0-9a-f]{32}$ ]]; then
            printf '%s\n' 'Existing API Worker Hyperdrive binding ID was invalid.' >&2
            exit 1
          fi
          if [[ "$reconciler_existed" == "true" && ! "$reconciler_hyperdrive_id" =~ ^[0-9a-f]{32}$ ]]; then
            printf '%s\n' 'Existing reconciler Worker Hyperdrive binding ID was invalid.' >&2
            exit 1
          fi
          if [[ "$PREVIEW_HYPERDRIVE_RETARGET_REQUIRED" == "true" ]]; then
            if [[ "$PREVIEW_HYPERDRIVE_RETARGET_APPROVED" != "true" ]]; then
              printf '%s\n' 'Preview Hyperdrive retarget was not explicitly approved.' >&2
              exit 1
            fi
            if [[ "$api_existed" != "true" || "$web_existed" != "true" ]]; then
              printf '%s\n' 'Preview Hyperdrive retarget requires existing API and Web Workers.' >&2
              exit 1
            fi
            if [[ "$reconciler_existed" == "true" ]]; then
              retarget_topology=COMPLETE
            else
              retarget_topology=API_WEB_LEGACY
            fi
            api_target_state="$(hyperdrive_target_state \
              'werehere-hotel-api-preview' "$API_RUNTIME_DATABASE_URL_FILE" \
              "$api_hyperdrive_id")"
            set +e
            retarget_decision="$(
              node "$GITHUB_WORKSPACE/scripts/preview-hyperdrive-retarget-contract.mjs" \
                decide "$PREVIEW_HYPERDRIVE_RETARGET_APPROVED" \
                DB_DEPENDENCY_UNAVAILABLE "$api_target_state" "$retarget_topology"
            )"
            decision_status="$?"
            set -e
            if [[ "$decision_status" -ne 0 || "$retarget_decision" != "RETARGET" ]]; then
              printf '%s\n' 'Preview API Hyperdrive retarget decision was denied.' >&2
              exit 1
            fi
            printf '%s\n' 'PREVIEW_API_HYPERDRIVE_TARGET_MISMATCH_CONFIRMED'
          elif [[ "$PREVIEW_HYPERDRIVE_RETARGET_APPROVED" == "true" ]]; then
            printf '%s\n' 'Preview Hyperdrive retarget was approved without a failed existing-Worker readiness gate.' >&2
            exit 1
          fi
          snapshot_legacy_hyperdrive "$legacy_before"
          legacy_hyperdrive_id="$(jq -er '.id | select(type == "string" and length > 0)' "$legacy_before")"
          ensure_hyperdrive 'werehere-hotel-api-preview' \
            "$API_RUNTIME_DATABASE_URL_FILE" api_id "$api_existed" \
            "$PREVIEW_HYPERDRIVE_RETARGET_REQUIRED" "$api_hyperdrive_id"
          ensure_hyperdrive 'werehere-hotel-reconciler-preview' \
            "$RECONCILER_DATABASE_URL_FILE" reconciler_id "$reconciler_existed" \
            "$PREVIEW_HYPERDRIVE_RETARGET_REQUIRED" "$reconciler_hyperdrive_id"
          snapshot_legacy_hyperdrive "$legacy_after"
          if [[ "$api_hyperdrive_id" == "$legacy_hyperdrive_id" ]]; then
            if [[ "$(jq -er '.id' "$legacy_after")" != "$legacy_hyperdrive_id" ]]; then
              printf '%s\n' 'The active legacy-named API Hyperdrive identity changed.' >&2
              exit 1
            fi
            printf '%s\n' 'PREVIEW_LEGACY_HYPERDRIVE_PROMOTED_TO_CANONICAL_API'
