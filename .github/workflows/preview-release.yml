      - name: Record secure session-authority rollback baseline
        id: secure_rollback_baseline
        shell: bash
        env:
          API_DEPLOYED: ${{ steps.deploy_api.outputs.deployed_version }}
          API_DEPLOY_TAG: secure-session-authority-v1-github-${{ github.run_id }}-${{ github.run_attempt }}-api
        run: |
          set -euo pipefail
          if [[ -z "$API_DEPLOYED" ]]; then
            printf '%s\n' 'Secure API deployment version is unavailable.' >&2
            exit 1
          fi
          deployments_file="$(mktemp)"
          trap 'rm -f "$deployments_file"' EXIT
          pnpm --filter @werehere/api exec wrangler deployments list \
            --name werehere-hotel-api-preview --json > "$deployments_file"
          jq -e --arg version "$API_DEPLOYED" '
            type == "array" and length > 0
            and (.[-1].versions | type) == "array"
            and (.[-1].versions | length) == 1
            and .[-1].versions[0].percentage == 100
            and .[-1].versions[0].version_id == $version
          ' "$deployments_file" >/dev/null
