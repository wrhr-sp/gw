name: hotel-preview-release

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: hotel-preview-release
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: preview
      url: https://werehere-hotel-web-preview.wereheresp.workers.dev
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AUTH_TRANSACTION_ENCRYPTION_KEY: ${{ secrets.AUTH_TRANSACTION_ENCRYPTION_KEY }}
      DATABASE_API_RUNTIME_PASSWORD_PREVIEW: ${{ secrets.DATABASE_API_RUNTIME_PASSWORD_PREVIEW }}
      DATABASE_RECONCILER_PASSWORD_PREVIEW: ${{ secrets.DATABASE_RECONCILER_PASSWORD_PREVIEW }}
      ZITADEL_SERVICE_USER_TOKEN: ${{ secrets.ZITADEL_SERVICE_USER_TOKEN }}
      ZITADEL_USER_PROVISIONER_TOKEN: ${{ secrets.ZITADEL_USER_PROVISIONER_TOKEN }}
      ZITADEL_PREVIEW_SUBJECT_SHA256: ${{ secrets.ZITADEL_PREVIEW_SUBJECT_SHA256 }}
      ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
      ZITADEL_CLIENT_ID: ${{ vars.ZITADEL_CLIENT_ID }}
      ZITADEL_CONSOLE_CLIENT_ID: ${{ vars.ZITADEL_CONSOLE_CLIENT_ID }}
      ZITADEL_REDIRECT_URI: ${{ vars.ZITADEL_REDIRECT_URI }}
      ZITADEL_ORGANIZATION_ID: ${{ vars.ZITADEL_ORGANIZATION_ID }}
      PREVIEW_BOOTSTRAP_APPROVAL_REF: ${{ vars.PREVIEW_BOOTSTRAP_APPROVAL_REF }}
      WEB_PREVIEW_URL: https://werehere-hotel-web-preview.wereheresp.workers.dev
      API_RUNTIME_DATABASE_URL_FILE: /tmp/werehere-preview-api-runtime-url
      RECONCILER_DATABASE_URL_FILE: /tmp/werehere-preview-reconciler-url

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Console smoke
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate required Preview configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_PREVIEW: ${{ secrets.DATABASE_URL_PREVIEW }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
        shell: bash
        run: |
          set -euo pipefail
          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            AUTH_TRANSACTION_ENCRYPTION_KEY
            DATABASE_URL
            DATABASE_URL_PREVIEW
            DATABASE_API_RUNTIME_PASSWORD_PREVIEW
            DATABASE_RECONCILER_PASSWORD_PREVIEW
            ZITADEL_SERVICE_USER_TOKEN
            ZITADEL_USER_PROVISIONER_TOKEN
            ZITADEL_PREVIEW_SUBJECT
            ZITADEL_PREVIEW_SUBJECT_SHA256
            ZITADEL_ISSUER
            ZITADEL_CLIENT_ID
            ZITADEL_CONSOLE_CLIENT_ID
            ZITADEL_REDIRECT_URI
            ZITADEL_ORGANIZATION_ID
            PREVIEW_BOOTSTRAP_APPROVAL_REF
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            for name in "${missing[@]}"; do
              printf 'Missing required Preview configuration: %s\n' "$name" >&2
            done
            exit 1
          fi
          node <<'NODE'
          const key = process.env.AUTH_TRANSACTION_ENCRYPTION_KEY;
          const bytes = Buffer.from(key, "base64url");
          if (!/^[A-Za-z0-9_-]+$/u.test(key)
            || bytes.byteLength !== 32
            || bytes.toString("base64url") !== key) {
            throw new Error("AUTH_TRANSACTION_ENCRYPTION_KEY must be canonical 256-bit base64url");
          }
          const { hkdfSync } = require("node:crypto");
          const identifierKey = hkdfSync(
            "sha256",
            bytes,
            Buffer.from("werehere-auth-rate-limit-salt-v1"),
            Buffer.from("werehere-auth-rate-limit-hmac-v1"),
            32,
          );
          if (identifierKey.byteLength !== 32) {
            throw new Error("AUTH identifier HMAC subkey derivation failed");
          }
          const expectedRedirect = "https://werehere-hotel-web-preview.wereheresp.workers.dev/api/auth/callback";
          if (process.env.ZITADEL_REDIRECT_URI !== expectedRedirect) {
            throw new Error("ZITADEL_REDIRECT_URI does not match the Preview Web callback");
          }
          NODE
          API_HYPERDRIVE_ID=00000000000000000000000000000000 \
            node scripts/render-api-preview-config.mjs \
              apps/api/wrangler.preview.jsonc \
              /tmp/werehere-api-preview-preflight.json
          rm -f /tmp/werehere-api-preview-preflight.json
          printf '%s\n' 'PREVIEW_CONFIGURATION_PRESENT'

      - name: Verify approved ZITADEL bootstrap identity
        env:
          ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
          ZITADEL_ORGANIZATION_ID: ${{ vars.ZITADEL_ORGANIZATION_ID }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
          ZITADEL_PREVIEW_SUBJECT_SHA256: ${{ secrets.ZITADEL_PREVIEW_SUBJECT_SHA256 }}
          ZITADEL_USER_PROVISIONER_TOKEN: ${{ secrets.ZITADEL_USER_PROVISIONER_TOKEN }}
        run: pnpm exec tsx packages/db/scripts/verify-zitadel-bootstrap.ts

      - name: Snapshot active Worker versions
        id: worker_snapshot
        shell: bash
        run: |
          set -euo pipefail
          worker_exists() {
            local worker_name="$1"
            local response_file
            response_file="$(mktemp)"
            local status
            if ! status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              -H "Authorization: Bearer $CLOUD...OKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/settings")"; then
              rm -f "$response_file"
              return 2
            fi
            if [[ "$status" == "200" ]]; then
              if jq -e '.success == true and (.result | type) == "object"' \
                "$response_file" >/dev/null; then
                rm -f "$response_file"
                return 0
              fi
              rm -f "$response_file"
              return 2
            fi
            if [[ "$status" == "404" ]]; then
              if jq -e '.success == false and (.errors | type) == "array"' \
                "$response_file" >/dev/null; then
                rm -f "$response_file"
                return 1
              fi
              rm -f "$response_file"
              return 2
            fi
            rm -f "$response_file"
            return 2
          }
          snapshot() {
            local output_name="$1"
            local worker_name="$2"
            if worker_exists "$worker_name"; then
              :
            else
              local exists_status="$?"
              if [[ "$exists_status" -eq 1 ]]; then
                printf '%s_previous=\n' "$output_name" >> "$GITHUB_OUTPUT"
                printf '%s_existed=false\n' "$output_name" >> "$GITHUB_OUTPUT"
                return
              fi
              printf 'Worker existence lookup failed: %s\n' "$worker_name" >&2
              exit 1
            fi
            local snapshot_file
            local version
            snapshot_file="$(mktemp)"
            pnpm --filter @werehere/api exec wrangler deployments list \
              --name "$worker_name" --json > "$snapshot_file"
            if ! version="$(jq -er '
              if type != "array" or length == 0 then
                error("Worker deployment history was missing")
              elif (.[-1].versions | type) != "array"
                or (.[-1].versions | length) != 1
                or (.[-1].versions[0].percentage | type) != "number"
                or .[-1].versions[0].percentage != 100
                or (.[-1].versions[0].version_id | type) != "string"
                or (.[-1].versions[0].version_id | length) == 0 then
                error("Active Worker deployment was not a single 100 percent version")
              else
                .[-1].versions[0].version_id
              end
            ' "$snapshot_file")"; then
              rm -f "$snapshot_file"
              printf 'Active Worker deployment is unsafe to snapshot: %s\n' "$worker_name" >&2
              exit 1
            fi
            rm -f "$snapshot_file"
            printf '%s_previous=%s\n' "$output_name" "$version" >> "$GITHUB_OUTPUT"
            printf '%s_existed=true\n' "$output_name" >> "$GITHUB_OUTPUT"
          }
          snapshot api werehere-hotel-api-preview
          snapshot reconciler werehere-hotel-account-reconciler-preview
          snapshot web werehere-hotel-web-preview

      - name: Validate Preview Worker snapshot topology
        shell: bash
        run: |
          set -euo pipefail
          api="${{ steps.worker_snapshot.outputs.api_existed }}"
          reconciler="${{ steps.worker_snapshot.outputs.reconciler_existed }}"
          web="${{ steps.worker_snapshot.outputs.web_existed }}"
          if [[ "$api" == "true" && "$reconciler" == "true" && "$web" == "true" ]]; then
            exit 0
          fi
          if [[ "$api" == "false" && "$reconciler" == "false" && "$web" == "false" ]]; then
            exit 0
          fi
          printf '%s\n' 'Preview Worker topology is partial; refusing release.' >&2
          exit 1

      - name: Expand Neon Preview database for compatible Worker deploy
        env:
          PREVIEW_PROVISION_PHASE: EXPAND
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_PREVIEW: ${{ secrets.DATABASE_URL_PREVIEW }}
          DATABASE_API_RUNTIME_PASSWORD_PREVIEW: ${{ secrets.DATABASE_API_RUNTIME_PASSWORD_PREVIEW }}
          DATABASE_RECONCILER_PASSWORD_PREVIEW: ${{ secrets.DATABASE_RECONCILER_PASSWORD_PREVIEW }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
          ZITADEL_PREVIEW_SUBJECT_SHA256: ${{ secrets.ZITADEL_PREVIEW_SUBJECT_SHA256 }}
          ZITADEL_PREVIEW_ORGANIZATION_ID: ${{ vars.ZITADEL_ORGANIZATION_ID }}
          PREVIEW_BOOTSTRAP_APPROVAL_REF: ${{ vars.PREVIEW_BOOTSTRAP_APPROVAL_REF }}
        run: pnpm exec tsx packages/db/scripts/provision-preview.ts

      - name: Verify previous Workers remain compatible after expand
        if: steps.worker_snapshot.outputs.api_existed == 'true' && steps.worker_snapshot.outputs.reconciler_existed == 'true' && steps.worker_snapshot.outputs.web_existed == 'true'
        id: expand_compatibility_smoke
        run: |
          node scripts/smoke-cloudflare-preview.mjs
          node scripts/smoke-zitadel-console-preview.mjs

      - name: Create or update Preview Hyperdrives
        id: hyperdrive
        shell: bash
        working-directory: apps/api
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/hyperdrive/configs"
          list_url="$api?per_page=100"
          temp_dir="$(mktemp -d)"
          legacy_before="$temp_dir/legacy-before.json"
          legacy_after="$temp_dir/legacy-after.json"
          trap 'rm -rf "$temp_dir"' EXIT
          fetch_hyperdrive_list() {
            local output_file="$1"
            curl --fail --silent --show-error \
              -H "Authorization: Bearer $CLOUD...OKEN" \
              "$list_url" > "$output_file"
            if ! node "$GITHUB_WORKSPACE/scripts/validate-cloudflare-hyperdrive-list.mjs" "$output_file" >/dev/null; then
              printf '%s\n' 'Hyperdrive list response failed safety validation.' >&2
              return 1
            fi
          }
          snapshot_legacy_hyperdrive() {
            local output_file="$1"
            local list_file
            local count
            list_file="$(mktemp "$temp_dir/hyperdrive-list.XXXXXX")"
            fetch_hyperdrive_list "$list_file"
            count="$(jq '[.result[] | select(.name == "werehere-hotel-preview")] | length' "$list_file")"
            if [[ "$count" -ne 1 ]]; then
              printf '%s\n' 'The legacy Preview Hyperdrive is unavailable or ambiguous.' >&2
              return 1
            fi
            jq -S '.result[] | select(.name == "werehere-hotel-preview")' \
              "$list_file" > "$output_file"
          }
          ensure_hyperdrive() {
            local name="$1"
            local url_file="$2"
            local output_name="$3"
            local runtime_url
            local list_file
            local count
            local id
            runtime_url="$(<"$url_file")"
            printf '::add-mask::%s\n' "$runtime_url"
            list_file="$(mktemp "$temp_dir/hyperdrive-list.XXXXXX")"
            fetch_hyperdrive_list "$list_file"
            count="$(jq --arg name "$name" '[.result[] | select(.name == $name)] | length' "$list_file")"
            if [[ "$count" -gt 1 ]]; then
              printf 'Multiple Hyperdrive configs have the same name: %s\n' "$name" >&2
              return 1
            fi
            if [[ "$count" -eq 0 ]]; then
              pnpm exec wrangler hyperdrive create "$name" \
                --config wrangler.preview.jsonc \
                --connection-string "$runtime_url" \
                --sslmode require \
                --caching-disabled >/dev/null
            else
              id="$(jq -er --arg name "$name" '
                .result[]
                | select(.name == $name)
                | .id
                | select(type == "string" and length > 0)
              ' "$list_file")"
              pnpm exec wrangler hyperdrive update "$id" \
                --config wrangler.preview.jsonc \
                --connection-string "$runtime_url" \
                --sslmode require \
                --caching-disabled >/dev/null
            fi
            fetch_hyperdrive_list "$list_file"
            count="$(jq --arg name "$name" '[.result[] | select(.name == $name)] | length' "$list_file")"
            if [[ "$count" -ne 1 ]]; then
              printf 'Hyperdrive config was unavailable or ambiguous after provisioning: %s\n' "$name" >&2
              return 1
            fi
            id="$(jq -er --arg name "$name" '.result[] | select(.name == $name) | .id | select(type == "string" and length > 0)' "$list_file")"
            printf '%s=%s\n' "$output_name" "$id" >> "$GITHUB_OUTPUT"
          }
          snapshot_legacy_hyperdrive "$legacy_before"
          ensure_hyperdrive 'werehere-hotel-api-preview' \
            "$API_RUNTIME_DATABASE_URL_FILE" api_id
          ensure_hyperdrive 'werehere-hotel-reconciler-preview' \
            "$RECONCILER_DATABASE_URL_FILE" reconciler_id
          snapshot_legacy_hyperdrive "$legacy_after"
          if ! cmp -s "$legacy_before" "$legacy_after"; then
            printf '%s\n' 'The legacy Preview Hyperdrive changed during account release provisioning.' >&2
            exit 1
          fi
          printf '%s\n' 'PREVIEW_LEGACY_HYPERDRIVE_PRESERVED'
          printf '%s\n' 'PREVIEW_HYPERDRIVES_READY'

      - name: Render API Preview configuration and secrets
        env:
          API_HYPERDRIVE_ID: ${{ steps.hyperdrive.outputs.api_id }}
          RECONCILER_HYPERDRIVE_ID: ${{ steps.hyperdrive.outputs.reconciler_id }}
        run: |
          node scripts/render-api-preview-config.mjs \
            apps/api/wrangler.preview.jsonc \
            apps/api/wrangler.preview.generated.json
          node scripts/render-reconciler-preview-config.mjs \
            apps/api/wrangler.reconciler.preview.jsonc \
            apps/api/wrangler.reconciler.preview.generated.json
          python - <<'PY'
          import json, os
          from pathlib import Path
          Path('/tmp/werehere-api-preview-secrets.json').write_text(json.dumps({
              'AUTH_TRANSACTION_ENCRYPTION_KEY': os.environ['AUTH_TRANSACTION_ENCRYPTION_KEY'],
              'ZITADEL_SERVICE_USER_TOKEN': os.environ['ZITADEL_SERVICE_USER_TOKEN'],
              'ZITADEL_USER_PROVISIONER_TOKEN': os.environ['ZITADEL_USER_PROVISIONER_TOKEN'],
          }))
          os.chmod('/tmp/werehere-api-preview-secrets.json', 0o600)
          PY

      - name: Deploy private account reconciler Worker
        id: deploy_reconciler
        working-directory: apps/api
        env:
          DEPLOY_TAG: github-${{ github.run_id }}-${{ github.run_attempt }}-reconciler
        shell: bash
        run: |
          set -euo pipefail
          printf 'deploy_attempted=true\n' >> "$GITHUB_OUTPUT"
          pnpm exec wrangler deploy \
            --config wrangler.reconciler.preview.generated.json \
            --secrets-file /tmp/werehere-api-preview-secrets.json \
            --strict \
            --tag "$DEPLOY_TAG"
          deployments_file="$(mktemp)"
          trap 'rm -f "$deployments_file"' EXIT
          resolve_tagged_version() {
            local worker_name="$1"
            local tag="$2"
            local valid_absence_count=0
            local attempt
            for attempt in 1 2 3 4 5; do
              local versions_file
              versions_file="$(mktemp)"
              if curl --fail --silent --show-error \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/versions?deployable=true" \
                > "$versions_file"; then
                local resolved
                if resolved="$(jq -er --arg tag "$tag" '
                  if .success != true
                    or (.result | type) != "object"
                    or (.result.items | type) != "array" then
                    error("Worker versions response failed safety validation")
                  else
                    [.result.items[] | select(.annotations["workers/tag"]? == $tag)] as $matches
                    | if ($matches | length) == 0 then ""
                      elif ($matches | length) != 1
                        or ($matches[0].id | type) != "string"
                        or ($matches[0].id | length) == 0 then
                        error("Tagged Worker version was ambiguous")
                      else $matches[0].id end
                  end
                ' "$versions_file")"; then
                  rm -f "$versions_file"
                  if [[ -n "$resolved" ]]; then
                    printf '%s\n' "$resolved"
                    return 0
                  fi
                  valid_absence_count=$((valid_absence_count + 1))
                else
                  rm -f "$versions_file"
                fi
              else
                rm -f "$versions_file"
              fi
              if [[ "$attempt" -lt 5 ]]; then sleep 2; fi
            done
            if [[ "$valid_absence_count" -eq 5 ]]; then return 1; fi
            return 2
          }
          deployed_version="$(resolve_tagged_version werehere-hotel-account-reconciler-preview "$DEPLOY_TAG")"
          printf 'deployed_version=%s\n' "$deployed_version" >> "$GITHUB_OUTPUT"
          pnpm exec wrangler deployments list --name werehere-hotel-account-reconciler-preview --json > "$deployments_file"
          jq -e --arg version "$deployed_version" '
            type == "array" and length > 0
            and (.[-1].versions | type) == "array"
            and (.[-1].versions | length) == 1
            and .[-1].versions[0].percentage == 100
            and .[-1].versions[0].version_id == $version
          ' "$deployments_file" >/dev/null

      - name: Deploy private API Worker
        id: deploy_api
        working-directory: apps/api
        env:
          DEPLOY_TAG: secure-session-authority-v1-github-${{ github.run_id }}-${{ github.run_attempt }}-api
        shell: bash
        run: |
          set -euo pipefail
          printf 'deploy_attempted=true\n' >> "$GITHUB_OUTPUT"
          pnpm exec wrangler deploy \
            --config wrangler.preview.generated.json \
            --secrets-file /tmp/werehere-api-preview-secrets.json \
            --strict \
            --tag "$DEPLOY_TAG"
          deployments_file="$(mktemp)"
          trap 'rm -f "$deployments_file"' EXIT
          resolve_tagged_version() {
            local worker_name="$1"
            local tag="$2"
            local valid_absence_count=0
            local attempt
            for attempt in 1 2 3 4 5; do
              local versions_file
              versions_file="$(mktemp)"
              if curl --fail --silent --show-error \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/versions?deployable=true" \
                > "$versions_file"; then
                local resolved
                if resolved="$(jq -er --arg tag "$tag" '
                  if .success != true
                    or (.result | type) != "object"
                    or (.result.items | type) != "array" then
                    error("Worker versions response failed safety validation")
                  else
                    [.result.items[] | select(.annotations["workers/tag"]? == $tag)] as $matches
                    | if ($matches | length) == 0 then ""
                      elif ($matches | length) != 1
                        or ($matches[0].id | type) != "string"
                        or ($matches[0].id | length) == 0 then
                        error("Tagged Worker version was ambiguous")
                      else $matches[0].id end
                  end
                ' "$versions_file")"; then
                  rm -f "$versions_file"
                  if [[ -n "$resolved" ]]; then
                    printf '%s\n' "$resolved"
                    return 0
                  fi
                  valid_absence_count=$((valid_absence_count + 1))
                else
                  rm -f "$versions_file"
                fi
              else
                rm -f "$versions_file"
              fi
              if [[ "$attempt" -lt 5 ]]; then sleep 2; fi
            done
            if [[ "$valid_absence_count" -eq 5 ]]; then return 1; fi
            return 2
          }
          deployed_version="$(resolve_tagged_version werehere-hotel-api-preview "$DEPLOY_TAG")"
          printf 'deployed_version=%s\n' "$deployed_version" >> "$GITHUB_OUTPUT"
          pnpm exec wrangler deployments list --name werehere-hotel-api-preview --json > "$deployments_file"
          jq -e --arg version "$deployed_version" '
            type == "array" and length > 0
            and (.[-1].versions | type) == "array"
            and (.[-1].versions | length) == 1
            and .[-1].versions[0].percentage == 100
            and .[-1].versions[0].version_id == $version
          ' "$deployments_file" >/dev/null

      - name: Build OpenNext Web Worker
        run: pnpm --filter @werehere/web build:cloudflare

      - name: Deploy public Web Worker
        id: deploy_web
        working-directory: apps/web
        env:
          DEPLOY_TAG: github-${{ github.run_id }}-${{ github.run_attempt }}-web
        shell: bash
        run: |
          set -euo pipefail
          printf 'deploy_attempted=true\n' >> "$GITHUB_OUTPUT"
          pnpm exec wrangler deploy --config wrangler.jsonc --strict --tag "$DEPLOY_TAG"
          deployments_file="$(mktemp)"
          trap 'rm -f "$deployments_file"' EXIT
          resolve_tagged_version() {
            local worker_name="$1"
            local tag="$2"
            local valid_absence_count=0
            local attempt
            for attempt in 1 2 3 4 5; do
              local versions_file
              versions_file="$(mktemp)"
              if curl --fail --silent --show-error \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/versions?deployable=true" \
                > "$versions_file"; then
                local resolved
                if resolved="$(jq -er --arg tag "$tag" '
                  if .success != true
                    or (.result | type) != "object"
                    or (.result.items | type) != "array" then
                    error("Worker versions response failed safety validation")
                  else
                    [.result.items[] | select(.annotations["workers/tag"]? == $tag)] as $matches
                    | if ($matches | length) == 0 then ""
                      elif ($matches | length) != 1
                        or ($matches[0].id | type) != "string"
                        or ($matches[0].id | length) == 0 then
                        error("Tagged Worker version was ambiguous")
                      else $matches[0].id end
                  end
                ' "$versions_file")"; then
                  rm -f "$versions_file"
                  if [[ -n "$resolved" ]]; then
                    printf '%s\n' "$resolved"
                    return 0
                  fi
                  valid_absence_count=$((valid_absence_count + 1))
                else
                  rm -f "$versions_file"
                fi
              else
                rm -f "$versions_file"
              fi
              if [[ "$attempt" -lt 5 ]]; then sleep 2; fi
            done
            if [[ "$valid_absence_count" -eq 5 ]]; then return 1; fi
            return 2
          }
          deployed_version="$(resolve_tagged_version werehere-hotel-web-preview "$DEPLOY_TAG")"
          printf 'deployed_version=%s\n' "$deployed_version" >> "$GITHUB_OUTPUT"
          pnpm exec wrangler deployments list --name werehere-hotel-web-preview --json > "$deployments_file"
          jq -e --arg version "$deployed_version" '
            type == "array" and length > 0
            and (.[-1].versions | type) == "array"
            and (.[-1].versions | length) == 1
            and .[-1].versions[0].percentage == 100
            and .[-1].versions[0].version_id == $version
          ' "$deployments_file" >/dev/null

      - name: Verify public Preview path and bootstrap mapping before contract
        id: preview_smoke
        env:
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
        run: |
          node scripts/smoke-cloudflare-preview.mjs
          node scripts/smoke-zitadel-console-preview.mjs

      - name: Verify hosted Preview account management and canonical login before contract
        id: account_management_smoke
        env:
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
        run: node scripts/smoke-account-preview.mjs

      - name: Contract Neon Preview tenant authority
        id: contract_database
        env:
          PREVIEW_PROVISION_PHASE: CONTRACT
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_PREVIEW: ${{ secrets.DATABASE_URL_PREVIEW }}
          DATABASE_API_RUNTIME_PASSWORD_PREVIEW: ${{ secrets.DATABASE_API_RUNTIME_PASSWORD_PREVIEW }}
          DATABASE_RECONCILER_PASSWORD_PREVIEW: ${{ secrets.DATABASE_RECONCILER_PASSWORD_PREVIEW }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
          ZITADEL_PREVIEW_SUBJECT_SHA256: ${{ secrets.ZITADEL_PREVIEW_SUBJECT_SHA256 }}
          ZITADEL_PREVIEW_ORGANIZATION_ID: ${{ vars.ZITADEL_ORGANIZATION_ID }}
          PREVIEW_BOOTSTRAP_APPROVAL_REF: ${{ vars.PREVIEW_BOOTSTRAP_APPROVAL_REF }}
        run: |
          printf 'contract_started=true\n' >> "$GITHUB_OUTPUT"
          pnpm exec tsx packages/db/scripts/provision-preview.ts

      - name: Verify public Preview path and bootstrap mapping after contract
        id: post_contract_smoke
        env:
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
        run: |
          node scripts/smoke-cloudflare-preview.mjs
          node scripts/smoke-zitadel-console-preview.mjs

      - name: Record secure session-authority rollback baseline
        id: secure_rollback_baseline
        shell: bash
        env:
          API_DEPLOYED: ${{ steps.deploy_api.outputs.deployed_version }}
          API_DEPLOY_TAG: secure-session-authority-v1-github-${{ github.run_id }}-${{ github.run_attempt }}-api
        run: |
          set -euo pipefail
          if [[ -z "$API_DEPLOYED" ]]; then
            printf '%s\n' 'Secure API deployment version is unavailable.' >&2
            exit 1
          fi
          deployments_file="$(mktemp)"
          trap 'rm -f "$deployments_file"' EXIT
          pnpm --filter @werehere/api exec wrangler deployments list \
            --name werehere-hotel-api-preview --json > "$deployments_file"
          jq -e --arg version "$API_DEPLOYED" '
            type == "array" and length > 0
            and (.[-1].versions | type) == "array"
            and (.[-1].versions | length) == 1
            and .[-1].versions[0].percentage == 100
            and .[-1].versions[0].version_id == $version
          ' "$deployments_file" >/dev/null
          {
            printf '## Secure Preview rollback baseline\n'
            printf -- '- Security contract: `session-derived-tenant-authority-v1`\n'
            printf -- '- Source commit: `%s`\n' "$GITHUB_SHA"
            printf -- '- Workflow run: `%s`\n' "$GITHUB_RUN_ID"
            printf -- '- API Worker version: `%s`\n' "$API_DEPLOYED"
            printf -- '- Deploy tag: `%s`\n' "$API_DEPLOY_TAG"
          } >> "$GITHUB_STEP_SUMMARY"
          printf 'secure_version=%s\n' "$API_DEPLOYED" >> "$GITHUB_OUTPUT"
          printf '%s\n' 'PREVIEW_SECURE_ROLLBACK_BASELINE_VERIFIED'

      - name: Roll back failed Worker release
        if: failure()
        shell: bash
        env:
          CONTRACT_STARTED: ${{ steps.contract_database.outputs.contract_started }}
          API_PREVIOUS: ${{ steps.worker_snapshot.outputs.api_previous }}
          API_EXISTED: ${{ steps.worker_snapshot.outputs.api_existed }}
          API_DEPLOY_OUTCOME: ${{ steps.deploy_api.outcome }}
          API_DEPLOYED: ${{ steps.deploy_api.outputs.deployed_version }}
          API_DEPLOY_ATTEMPTED: ${{ steps.deploy_api.outputs.deploy_attempted }}
          API_DEPLOY_TAG: secure-session-authority-v1-github-${{ github.run_id }}-${{ github.run_attempt }}-api
          RECONCILER_PREVIOUS: ${{ steps.worker_snapshot.outputs.reconciler_previous }}
          RECONCILER_EXISTED: ${{ steps.worker_snapshot.outputs.reconciler_existed }}
          RECONCILER_DEPLOY_OUTCOME: ${{ steps.deploy_reconciler.outcome }}
          RECONCILER_DEPLOYED: ${{ steps.deploy_reconciler.outputs.deployed_version }}
          RECONCILER_DEPLOY_ATTEMPTED: ${{ steps.deploy_reconciler.outputs.deploy_attempted }}
          RECONCILER_DEPLOY_TAG: github-${{ github.run_id }}-${{ github.run_attempt }}-reconciler
          WEB_PREVIOUS: ${{ steps.worker_snapshot.outputs.web_previous }}
          WEB_EXISTED: ${{ steps.worker_snapshot.outputs.web_existed }}
          WEB_DEPLOY_OUTCOME: ${{ steps.deploy_web.outcome }}
          WEB_DEPLOYED: ${{ steps.deploy_web.outputs.deployed_version }}
          WEB_DEPLOY_ATTEMPTED: ${{ steps.deploy_web.outputs.deploy_attempted }}
          WEB_DEPLOY_TAG: github-${{ github.run_id }}-${{ github.run_attempt }}-web
        run: |
          set +e
          resolve_tagged_version() {
            local worker_name="$1"
            local tag="$2"
            local valid_absence_count=0
            local attempt
            for attempt in 1 2 3 4 5; do
              local versions_file
              versions_file="$(mktemp)"
              if curl --fail --silent --show-error \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/versions?deployable=true" \
                > "$versions_file"; then
                local resolved
                if resolved="$(jq -er --arg tag "$tag" '
                  if .success != true
                    or (.result | type) != "object"
                    or (.result.items | type) != "array" then
                    error("Worker versions response failed safety validation")
                  else
                    [.result.items[] | select(.annotations["workers/tag"]? == $tag)] as $matches
                    | if ($matches | length) == 0 then ""
                      elif ($matches | length) != 1
                        or ($matches[0].id | type) != "string"
                        or ($matches[0].id | length) == 0 then
                        error("Tagged Worker version was ambiguous")
                      else $matches[0].id end
                  end
                ' "$versions_file")"; then
                  rm -f "$versions_file"
                  if [[ -n "$resolved" ]]; then
                    printf '%s\n' "$resolved"
                    return 0
                  fi
                  valid_absence_count=$((valid_absence_count + 1))
                else
                  rm -f "$versions_file"
                fi
              else
                rm -f "$versions_file"
              fi
              if [[ "$attempt" -lt 5 ]]; then sleep 2; fi
            done
            if [[ "$valid_absence_count" -eq 5 ]]; then return 1; fi
            return 2
          }
          active_worker_version() {
            local worker_name="$1"
            local snapshot_file
            snapshot_file="$(mktemp)"
            if ! pnpm --filter @werehere/api exec wrangler deployments list \
              --name "$worker_name" --json > "$snapshot_file"; then
              rm -f "$snapshot_file"
              return 1
            fi
            if ! jq -er '
              if type != "array" or length == 0
                or (.[-1].versions | type) != "array"
                or (.[-1].versions | length) != 1
                or .[-1].versions[0].percentage != 100
                or (.[-1].versions[0].version_id | type) != "string"
                or (.[-1].versions[0].version_id | length) == 0 then
                error("Active Worker deployment was not a single 100 percent version")
              else
                .[-1].versions[0].version_id
              end
            ' "$snapshot_file"; then
              rm -f "$snapshot_file"
              return 1
            fi
            rm -f "$snapshot_file"
          }
          worker_exists() {
            local worker_name="$1"
            local response_file
            response_file="$(mktemp)"
            local status
            if ! status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker_name/settings")"; then
              rm -f "$response_file"
              return 2
            fi
            if [[ "$status" == "200" ]]; then
              if jq -e '.success == true and (.result | type) == "object"' \
                "$response_file" >/dev/null; then
                rm -f "$response_file"
                return 0
              fi
              rm -f "$response_file"
              return 2
            fi
            if [[ "$status" == "404" ]]; then
              if jq -e '.success == false and (.errors | type) == "array"' \
                "$response_file" >/dev/null; then
                rm -f "$response_file"
                return 1
              fi
              rm -f "$response_file"
              return 2
            fi
            rm -f "$response_file"
            return 2
          }
          rollback_worker() {
            local worker_name="$1"
            local previous="$2"
            local existed="$3"
            local outcome="$4"
            local deployed="$5"
            local attempted="$6"
            local deploy_tag="$7"
            if [[ "$outcome" == "skipped" || -z "$outcome" ]]; then
              return 0
            fi
            if [[ "$attempted" != "true" ]]; then
              return 1
            fi
            if [[ -z "$deployed" ]]; then
              local recovered
              recovered="$(resolve_tagged_version "$worker_name" "$deploy_tag")"
              local resolve_status="$?"
              if [[ "$resolve_status" -eq 0 ]]; then
                deployed="$recovered"
              elif [[ "$resolve_status" -eq 1 && "$outcome" == "failure" ]]; then
                if [[ "$existed" == "true" && -n "$previous" ]]; then
                  local unchanged_active
                  unchanged_active="$(active_worker_version "$worker_name")" || return 1
                  [[ "$unchanged_active" == "$previous" ]]
                  return
                fi
                if [[ "$existed" == "false" ]]; then
                  if worker_exists "$worker_name"; then
                    return 1
                  else
                    [[ "$?" -eq 1 ]]
                    return
                  fi
                fi
                return 1
              else
                return 1
              fi
            fi
            local current
            current="$(active_worker_version "$worker_name")" || return 1
            if [[ "$current" != "$deployed" ]]; then
              printf 'Worker changed outside this release; refusing rollback: %s\n' "$worker_name" >&2
              return 1
            fi
            if [[ "$existed" == "true" && -n "$previous" ]]; then
              # Wrangler 4.111.0 and the provider API expose no expected-current/ETag
              # rollback mutation. Any automatic rollback can overwrite a concurrent
              # deployment after the active-version check, so fail closed instead.
              printf 'Conditional rollback is unavailable; operator recovery required: %s\n' "$worker_name" >&2
              return 1
            fi
            if [[ "$existed" == "false" ]]; then
              # Never auto-delete a first deployment: Wrangler delete has no conditional
              # expected-current fence and could delete a concurrently deployed Worker.
              printf 'First-deploy rollback requires operator recovery: %s\n' "$worker_name" >&2
              return 1
            fi
            return 1
          }
          if [[ "$CONTRACT_STARTED" == "true" ]]; then
            contract_active_failed=0
            [[ "$(active_worker_version werehere-hotel-api-preview)" == "$API_DEPLOYED" ]] \
              || contract_active_failed=1
            [[ "$(active_worker_version werehere-hotel-account-reconciler-preview)" == "$RECONCILER_DEPLOYED" ]] \
              || contract_active_failed=1
            [[ "$(active_worker_version werehere-hotel-web-preview)" == "$WEB_DEPLOYED" ]] \
              || contract_active_failed=1
            if [[ "$contract_active_failed" -ne 0 ]]; then
              printf '%s\n' 'POST_CONTRACT_ACTIVE_WORKER_CHANGED' >&2
            else
              printf '%s\n' 'POST_CONTRACT_COMPATIBLE_WORKERS_PRESERVED' >&2
            fi
            printf '%s\n' 'PREVIEW_CONTRACT_OPERATOR_RECOVERY_REQUIRED' >&2
            exit 1
          fi

          rollback_failed=0
          rollback_worker werehere-hotel-web-preview \
            "$WEB_PREVIOUS" "$WEB_EXISTED" "$WEB_DEPLOY_OUTCOME" "$WEB_DEPLOYED" \
            "$WEB_DEPLOY_ATTEMPTED" "$WEB_DEPLOY_TAG" || rollback_failed=1
          rollback_worker werehere-hotel-api-preview \
            "$API_PREVIOUS" "$API_EXISTED" "$API_DEPLOY_OUTCOME" "$API_DEPLOYED" \
            "$API_DEPLOY_ATTEMPTED" "$API_DEPLOY_TAG" || rollback_failed=1
          rollback_worker werehere-hotel-account-reconciler-preview \
            "$RECONCILER_PREVIOUS" "$RECONCILER_EXISTED" "$RECONCILER_DEPLOY_OUTCOME" "$RECONCILER_DEPLOYED" \
            "$RECONCILER_DEPLOY_ATTEMPTED" "$RECONCILER_DEPLOY_TAG" || rollback_failed=1
          if [[ "$rollback_failed" -ne 0 ]]; then
            printf '%s\n' 'PREVIEW_WORKER_OPERATOR_RECOVERY_REQUIRED' >&2
            exit 1
          fi
          printf '%s\n' 'PREVIEW_WORKER_ROLLBACK_VERIFIED'

      - name: Remove transient credential files
        if: always()
        run: |
          rm -f "$API_RUNTIME_DATABASE_URL_FILE"
          rm -f "$RECONCILER_DATABASE_URL_FILE"
          rm -f /tmp/werehere-api-preview-secrets.json
          rm -f /tmp/werehere-api-preview-preflight.json
          rm -f apps/api/wrangler.preview.generated.json
          rm -f apps/api/wrangler.reconciler.preview.generated.json
