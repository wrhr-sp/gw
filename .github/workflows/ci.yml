name: hotel-platform-ci

on:
  pull_request:
  push:
    branches:
      - main
      - feat/hotel-first-platform

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: werehere_hotel_ci
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d werehere_hotel_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      TEST_DATABASE_URL: postgresql://postgres@127.0.0.1:5432/werehere_hotel_ci
      ALLOW_DESTRUCTIVE_TEST_DATABASE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint boundaries and source
        run: pnpm run lint

      - name: Typecheck and unit tests
        run: pnpm run check

      - name: Build Web and API Worker
        run: pnpm run build

      - name: PostgreSQL migration and boundary tests
        run: pnpm run test:integration
