name: preview-zitadel-password-policy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-zitadel-password-policy
  cancel-in-progress: false

jobs:
  apply-preview-policy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: preview
    env:
      ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
      ZITADEL_SERVICE_USER_TOKEN: ${{ secrets.ZITADEL_SERVICE_USER_TOKEN }}

    steps:
      - name: Apply and verify Preview password complexity policy
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$ZITADEL_ISSUER" || -z "$ZITADEL_SERVICE_USER_TOKEN" ]]; then
            printf '%s\n' 'Preview ZITADEL policy configuration is missing.' >&2
            exit 1
          fi
          issuer="${ZITADEL_ISSUER%/}"
          endpoint="$issuer/admin/v1/policies/password/complexity"
          current_file="$(mktemp)"
          original_file="$(mktemp)"
          desired_file="$(mktemp)"
          verify_file="$(mktemp)"
          rollback_file="$(mktemp)"
          trap 'rm -f "$current_file" "$original_file" "$desired_file" "$verify_file" "$rollback_file"' EXIT

          request() {
            local method="$1"
            local output_file="$2"
            local body_file="${3:-}"
            local args=(
              --silent
              --show-error
              --output "$output_file"
              --write-out '%{http_code}'
              --request "$method"
              --header "Authorization: Bearer $ZITADEL_SERVICE_USER_TOKEN"
              --header 'Accept: application/json'
            )
            if [[ -n "$body_file" ]]; then
              args+=(--header 'Content-Type: application/json' --data-binary "@$body_file")
            fi
            curl "${args[@]}" "$endpoint"
          }

          current_status="$(request GET "$current_file")"
          if [[ "$current_status" != "200" ]]; then
            printf 'Preview ZITADEL policy read failed with HTTP %s.\n' "$current_status" >&2
            exit 1
          fi
          if ! jq -e '
            .policy != null
            and (.policy.minLength | type) == "number"
            and (.policy.hasUppercase | type) == "boolean"
            and (.policy.hasLowercase | type) == "boolean"
            and (.policy.hasNumber | type) == "boolean"
            and (.policy.hasSymbol | type) == "boolean"
          ' "$current_file" >/dev/null; then
            printf '%s\n' 'Preview ZITADEL policy response failed safety validation.' >&2
            exit 1
          fi
          jq '.policy | {
            minLength,
            hasUppercase,
            hasLowercase,
            hasNumber,
            hasSymbol
          }' "$current_file" > "$original_file"
          jq -n '{
            minLength: 8,
            hasUppercase: false,
            hasLowercase: false,
            hasNumber: true,
            hasSymbol: true
          }' > "$desired_file"

          update_status="$(request PUT "$verify_file" "$desired_file")"
          if [[ "$update_status" != "200" ]]; then
            printf 'Preview ZITADEL policy update failed with HTTP %s.\n' "$update_status" >&2
            exit 1
          fi

          verify_status="$(request GET "$verify_file")"
          if [[ "$verify_status" == "200" ]] && jq -e '
            .policy.minLength == 8
            and .policy.hasUppercase == false
            and .policy.hasLowercase == false
            and .policy.hasNumber == true
            and .policy.hasSymbol == true
          ' "$verify_file" >/dev/null; then
            printf '%s\n' 'PREVIEW_ZITADEL_PASSWORD_POLICY_OK'
            exit 0
          fi

          rollback_status="$(request PUT "$rollback_file" "$original_file")"
          if [[ "$rollback_status" != "200" ]]; then
            printf '%s\n' 'Preview ZITADEL policy verification and rollback both failed.' >&2
            exit 1
          fi
          rollback_status="$(request GET "$rollback_file")"
          if [[ "$rollback_status" != "200" ]] || ! jq -e --slurpfile original "$original_file" '
            (.policy | {
              minLength,
              hasUppercase,
              hasLowercase,
              hasNumber,
              hasSymbol
            }) == $original[0]
          ' "$rollback_file" >/dev/null; then
            printf '%s\n' 'Preview ZITADEL policy rollback verification failed.' >&2
            exit 1
          fi
          printf '%s\n' 'Preview ZITADEL policy did not match after update; original policy restored.' >&2
          exit 1
