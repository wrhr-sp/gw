name: preview-zitadel-password-policy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-zitadel-password-policy
  cancel-in-progress: false

jobs:
  apply-preview-policy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: preview
    env:
      ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
      ZITADEL_SERVICE_USER_TOKEN: ${{ secrets.ZITADEL_SERVICE_USER_TOKEN }}

    steps:
      - name: Apply and verify Preview password complexity policy
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$ZITADEL_ISSUER" || -z "$ZITADEL_SERVICE_USER_TOKEN" ]]; then
            printf '%s\n' 'Preview ZITADEL policy configuration is missing.' >&2
            exit 1
          fi
          issuer="${ZITADEL_ISSUER%/}"
          endpoint="$issuer/admin/v1/policies/password/complexity"
          current_file="$(mktemp)"
          original_file="$(mktemp)"
          desired_file="$(mktemp)"
          preflight_file="$(mktemp)"
          preflight_policy_file="$(mktemp)"
          update_file="$(mktemp)"
          reconcile_file="$(mktemp)"
          reconcile_policy_file="$(mktemp)"
          trap 'rm -f "$current_file" "$original_file" "$desired_file" "$preflight_file" "$preflight_policy_file" "$update_file" "$reconcile_file" "$reconcile_policy_file"' EXIT

          request() {
            local method="$1"
            local output_file="$2"
            local body_file="${3:-}"
            local args=(
              --silent
              --show-error
              --connect-timeout 10
              --max-time 30
              --output "$output_file"
              --write-out '%{http_code}'
              --request "$method"
              --header "Authorization: Bearer $ZITADEL_SERVICE_USER_TOKEN"
              --header 'Accept: application/json'
            )
            if [[ -n "$body_file" ]]; then
              args+=(--header 'Content-Type: application/json' --data-binary "@$body_file")
            fi
            curl "${args[@]}" "$endpoint"
          }

          validate_policy() {
            jq -e '
              .policy != null
              and (.policy.details.sequence | type) == "string"
              and (.policy.details.sequence | test("^[0-9]+$"))
              and (.policy.minLength | type) == "string"
              and (.policy.minLength | test("^[0-9]+$"))
              and (.policy.hasUppercase | type) == "boolean"
              and (.policy.hasLowercase | type) == "boolean"
              and (.policy.hasNumber | type) == "boolean"
              and (.policy.hasSymbol | type) == "boolean"
            ' "$1" >/dev/null
          }

          normalize_policy() {
            jq '.policy | {
              minLength: (.minLength | tonumber),
              hasUppercase,
              hasLowercase,
              hasNumber,
              hasSymbol
            }' "$1" > "$2"
          }

          if ! current_status="$(request GET "$current_file")"; then
            printf '%s\n' 'Preview ZITADEL policy initial read transport failed.' >&2
            exit 1
          fi
          if [[ "$current_status" != "200" ]]; then
            printf 'Preview ZITADEL policy read failed with HTTP %s.\n' "$current_status" >&2
            exit 1
          fi
          if ! validate_policy "$current_file"; then
            printf '%s\n' 'Preview ZITADEL policy response failed safety validation.' >&2
            exit 1
          fi
          normalize_policy "$current_file" "$original_file"
          original_sequence="$(jq -er '.policy.details.sequence' "$current_file")"
          jq -n '{
            minLength: 8,
            hasUppercase: false,
            hasLowercase: true,
            hasNumber: true,
            hasSymbol: true
          }' > "$desired_file"

          if cmp -s "$original_file" "$desired_file"; then
            printf '%s\n' 'PREVIEW_ZITADEL_PASSWORD_POLICY_OK'
            exit 0
          fi

          if ! preflight_status="$(request GET "$preflight_file")"; then
            printf '%s\n' 'Preview ZITADEL policy preflight transport failed.' >&2
            exit 1
          fi
          if [[ "$preflight_status" != "200" ]] || ! validate_policy "$preflight_file"; then
            printf '%s\n' 'Preview ZITADEL policy preflight failed safety validation.' >&2
            exit 1
          fi
          normalize_policy "$preflight_file" "$preflight_policy_file"
          preflight_sequence="$(jq -er '.policy.details.sequence' "$preflight_file")"
          if [[ "$preflight_sequence" != "$original_sequence" ]] || ! cmp -s "$preflight_policy_file" "$original_file"; then
            printf '%s\n' 'Preview ZITADEL policy changed before update; no mutation performed.' >&2
            exit 1
          fi

          update_status="000"
          if ! update_status="$(request PUT "$update_file" "$desired_file")"; then
            printf '%s\n' 'Preview ZITADEL policy update transport was ambiguous; reconciling authoritative state.' >&2
          elif [[ "$update_status" != "200" ]]; then
            printf 'Preview ZITADEL policy update returned HTTP %s; reconciling authoritative state.\n' "$update_status" >&2
          fi

          last_observation="unknown"
          for attempt in 1 2 3 4 5; do
            last_observation="unknown"
            reconcile_status="000"
            if reconcile_status="$(request GET "$reconcile_file")" \
              && [[ "$reconcile_status" == "200" ]] \
              && validate_policy "$reconcile_file"; then
              normalize_policy "$reconcile_file" "$reconcile_policy_file"
              if cmp -s "$reconcile_policy_file" "$desired_file"; then
                printf '%s\n' 'PREVIEW_ZITADEL_PASSWORD_POLICY_OK'
                exit 0
              fi
              if cmp -s "$reconcile_policy_file" "$original_file"; then
                last_observation="original"
              else
                last_observation="external"
                break
              fi
            fi
            if [[ "$attempt" -lt 5 ]]; then sleep 2; fi
          done

          if [[ "$last_observation" == "external" ]]; then
            printf '%s\n' 'Preview ZITADEL policy changed externally; no rollback mutation performed.' >&2
            exit 1
          fi
          if [[ "$last_observation" == "original" ]]; then
            printf '%s\n' 'Preview ZITADEL policy update was not applied; original policy remains effective.' >&2
            exit 1
          fi
          printf '%s\n' 'Preview ZITADEL policy state could not be reconciled safely.' >&2
          exit 1
