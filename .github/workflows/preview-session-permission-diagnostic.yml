name: Align Preview admin login

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: align-preview-admin-login
  cancel-in-progress: false

jobs:
  align-preview-admin:
    runs-on: ubuntu-latest
    environment: preview
    timeout-minutes: 5
    steps:
      - name: Align Preview username and request a new reset email
        env:
          ZITADEL_ISSUER: ${{ vars.ZITADEL_ISSUER }}
          ZITADEL_PREVIEW_SUBJECT: ${{ secrets.ZITADEL_PREVIEW_SUBJECT }}
          ZITADEL_SERVICE_USER_TOKEN: ${{ secrets.ZITADEL_SERVICE_USER_TOKEN }}
        run: |
          node <<'NODE'
          const issuerValue = process.env.ZITADEL_ISSUER?.trim();
          const subject = process.env.ZITADEL_PREVIEW_SUBJECT?.trim();
          const token = process.env.ZITADEL_SERVICE_USER_TOKEN?.trim();
          if (!issuerValue || !subject || !token) {
            throw new Error("Preview admin alignment configuration is incomplete");
          }
          const issuer = new URL(issuerValue);
          if (
            issuer.protocol !== "https:" || issuer.username || issuer.password ||
            issuer.pathname !== "/" || issuer.search || issuer.hash
          ) throw new Error("Preview admin alignment issuer is invalid");
          const desiredUsername = "preview-admin";
          const headers = { accept: "application/json", authorization: `Bearer ${token}` };
          const userUrl = new URL(`/v2/users/${encodeURIComponent(subject)}`, issuer);
          const readUser = async () => {
            const response = await fetch(userUrl, { headers, redirect: "manual" });
            if (response.status !== 200) throw new Error("Preview subject read failed");
            const body = await response.json();
            const user = body?.user;
            if (!user || user.state !== "USER_STATE_ACTIVE" || typeof user.username !== "string") {
              throw new Error("Preview subject is not an active human user");
            }
            return user;
          };
          const before = await readUser();
          if (before.username !== desiredUsername) {
            const update = await fetch(userUrl, {
              body: JSON.stringify({ username: desiredUsername }),
              headers: { ...headers, "content-type": "application/json" },
              method: "PATCH",
              redirect: "manual",
            });
            if (update.status !== 200) {
              throw new Error(`Preview username update failed with HTTP ${update.status}`);
            }
          }
          const after = await readUser();
          if (after.username !== desiredUsername) {
            throw new Error("Preview username read-back mismatch");
          }
          const urlTemplate = "https://werehere-hotel-web-preview.wereheresp.workers.dev/password/set#userID={{.UserID}}&code={{.Code}}&orgID={{.OrgID}}";
          const reset = await fetch(
            new URL(`/v2/users/${encodeURIComponent(subject)}/password_reset`, issuer),
            {
              body: JSON.stringify({
                sendLink: {
                  notificationType: "NOTIFICATION_TYPE_Email",
                  urlTemplate,
                },
              }),
              headers: { ...headers, "content-type": "application/json" },
              method: "POST",
              redirect: "manual",
            },
          );
          if (!reset.ok) throw new Error(`Preview password reset failed with HTTP ${reset.status}`);
          const resetBody = await reset.json();
          if (resetBody.verificationCode || resetBody.verification_code) {
            throw new Error("Preview reset returned a code instead of sending email");
          }
          console.log("PREVIEW_ADMIN_USERNAME_ALIGNED_AND_RESET_EMAIL_REQUESTED");
          NODE
