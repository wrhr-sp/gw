services:
  zitadel-db:
    image: postgres:16-alpine
    container_name: gw-zitadel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: zitadel
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: zitadel_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitadel -d zitadel"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - zitadel-db-data:/var/lib/postgresql/data

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.3
    container_name: gw-zitadel
    restart: unless-stopped
    depends_on:
      zitadel-db:
        condition: service_healthy
    command:
      - start-from-init
      - --masterkey
      - MasterkeyNeedsToHave32Characters
      - --tlsMode
      - disabled
    environment:
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: "8080"
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel_dev_password
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel_dev_password
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # 로컬 개발용 초기 관리자입니다. 운영/preview/prod secret으로 사용하지 않습니다.
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: AdminPassword1!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
    ports:
      - "8080:8080"

volumes:
  zitadel-db-data:
